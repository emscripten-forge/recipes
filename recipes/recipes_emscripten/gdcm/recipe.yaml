context:
  version: 2.8.9
  name: gdcm

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/malaterre/GDCM/archive/v${{ version }}.tar.gz
  sha256: 6379907946f0a0c682fb5f265053bfab5df9699265d212c47388da7c54045235

build:
  number: 3

  files:
    exclude:
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
    - python
    - crossenv >=1.2
    - cross-python_emscripten-wasm32
    - ${{ compiler("c") }}
    - swig
    - pkg-config
    - cmake
    - make
  host:
    - python
    - libuuid
    - zlib
    - openjpeg
    - expat
    - json-c
    - libpython
    - libjpeg-turbo
    - openssl
  run:
    - json-c
    - python

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_gdcm.py


about:
  homepage: https://sourceforge.net/p/gdcm/gdcm/ 
  license: BSD-2-Clause
  license_file: Copyright.txt
  summary:  Grassroots DICOM, cross-platform DICOM implementation.

extra:
  recipe-maintainers:
  - DerThorsten
