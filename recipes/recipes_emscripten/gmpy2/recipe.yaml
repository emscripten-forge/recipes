context:
  version: 2.3.1
  name: gmpy2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/g/gmpy2/gmpy2-${{ version }}.tar.gz
  sha256: 313f35e9fe6b9ddf72759b14dac25166fe5757c970403e4bbf87a70ab2be07df

build:
  number: 0
  script: ${PYTHON} -m pip install . ${PIP_ARGS}

requirements:
  build:
  - python
  - cross-python_${{ target_platform }}
  - ${{ compiler('c') }}
  - pip
  host:
  - gmp
  - mpc
  - mpfr
  - python
  run:
  - python

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_gmpy2.py

about:
  homepage: https://pypi.python.org/pypi/gmpy2
  license: LGPL-3.0-or-later
  license_file: COPYING.LESSER
  summary: GMP/MPIR, MPFR, and MPC interface to Python 2.6+ and 3.x

extra:
  recipe-maintainers:
  - wolfv
