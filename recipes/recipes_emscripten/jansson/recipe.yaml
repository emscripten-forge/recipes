context:
  name: jansson
  version: 2.15.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/akheron/jansson/releases/download/v${{ version }}/jansson-${{ version }}.tar.gz
  sha256: 0c7114dc0b2d22a670724a1f95922029d7077c19dbf79a584cb8084d2f267f2f

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler("c") }}
  - ${{ compiler('cxx') }}
  - pkg-config
  - autoconf-archive

tests:
- package_contents:
    files:
    - lib/libjansson.a
    - include/jansson.h

about:
  homepage: http://www.digip.org/jansson/
  license: MIT
  license_file: LICENSE
  summary: C library for encoding, decoding and manipulating JSON data 

extra:
  recipe-maintainers:
  - wangyenshu