context:
  name: scipy
  version: 1.18.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/s/scipy/scipy-${{ version }}.tar.gz
  sha256: 67b2ad2ad54c72ca6d04975a9b2df8c3638c34ddd5b28738e94fc2b57929d378
  patches:
  # Patches for subprojects
  - patches/0001-Disable-threads-in-subprojects.patch
  # Branch containing following patches is v1.18.0-emforge at https://github.com/ianthomas23/scipy
  # Use `git format-patch v1.18.0...v1.18.0-emforge --start-number 2` to create patch files.
  - patches/0002-Disable-unsupported-ffloat-store.patch
  - patches/0003-Set-fortran-linker-to-emcc.patch
  - patches/0004-Remove-unsupported-version-script.patch
  - patches/0005-Remove-chla_transtype.patch
  - patches/0006-Disable-threads.patch
  - patches/0007-Extra-char-length-arguments-in-linalg-cython-wrapper.patch
  - patches/0008-Extra-char-length-args-in-_common_array_utils.patch
  - patches/0009-Extra-char-length-args-in-propack.patch
  - patches/0010-Extra-char-length-args-in-arpack.patch
  - patches/0011-Change-return-and-char-length-args-in-dsolve.patch
  - patches/0012-Change-return-and-char-length-args-in-optimize.patch
  - patches/0013-Extra-char-length-args-in-integrate.patch
  - patches/0014-int-return-for-superlu_utils-and-input_error.patch
  - patches/0015-Extra-char-length-args-to-f2py-source-files.patch

build:
  number: 0

  files:
    exclude:
    - '**/*.pyi'
    - '**/tests/**'
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - python
  - cross-python_${{ target_platform }}
  - cython
    # - llvm_${{ target_platform }} # Installing custom LLVM in build.sh
  - meson-python
  - numpy
  - pkg-config
  host:
  - numpy
  - openblas
  - pybind11
  - python
  run:
  - python
  - numpy
  - openblas

tests:
- script: pytester
  files:
    recipe:
    - test_scipy.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run

about:
  homepage: http://www.scipy.org/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Scientific Library for Python
  description: |
    SciPy is a Python-based ecosystem of open-source software for mathematics,
    science, and engineering.

extra:
  maintainers:
  - ianthomas23
