context:
  name: palp
  version: '2.21'

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://hep.itp.tuwien.ac.at/~kreuzer/CY/palp/palp-${{ version }}.tar.gz
  sha256: 7e4a7bf219998a844c0bcce0a176e49d0743cb4b505a0e195329bf2ec196ddd7

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler("c") }}
  - ${{ compiler('cxx') }}
  - pkg-config
  - autoconf-archive

tests:
  - package_contents:
      files:
        - bin/tachyon

about:
  homepage: https://hep.itp.tuwien.ac.at/~kreuzer/CY/CYpalp.html
  license: GPL-3.0-only
  license_file: COPYING
  summary: A package for Analyzing Lattice Polytopes

extra:
  recipe-maintainers:
  - wangyenshu