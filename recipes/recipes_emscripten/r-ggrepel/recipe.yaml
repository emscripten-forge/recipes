context:
  version: 0.9.7
  name: r-ggrepel
  r_base_version: 4.5.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 6d51e597ff7a583dacae331be711703169f0e9988926f381ce25636c3a12c237

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }}
  - ${{ compiler('cxx') }}
  - r-base == ${{ r_base_version }}
  - r-ggplot2
  - r-rcpp
  - r-rlang
  - r-scales
  - r-withr
  - r-magrittr
  - r-ggplot2
  host:
  - r-base == ${{ r_base_version }}
  - r-ggplot2
  - r-rcpp
  - r-rlang
  - r-scales
  - r-withr
  - r-magrittr
  - r-ggplot2
  run:
  - r-base == ${{ r_base_version }}
  - r-ggplot2
  - r-rcpp
  - r-rlang
  - r-scales
  - r-withr
  - r-magrittr
  - r-ggplot2

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so

about:
  homepage: https://ggrepel.slowkow.com/
  repository: https://github.com/slowkow/ggrepel
  license: GPL-3.0-only
  license_file: LICENSE
  summary: |
    Repel overlapping text labels away from each other in your ggplot2 figures.
  description: |
    Provides text and label geoms for 'ggplot2' that help to avoid overlapping
    text labels. Labels repel away from each other and away from the data points.

extra:
  recipe-maintainers:
  - IsabelParedes
