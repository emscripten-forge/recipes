context:
  version: 4.7.2

package:
  name: libtiff
  version: ${{ version }}

source:
  url: https://download.osgeo.org/libtiff/tiff-${{ version }}.tar.gz
  sha256: 672bd7d10aee4606171afb864f3570b83340f6a33e2c186dc0512f7145ffdf6a

build:
  number: 0

requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - cmake
  - ninja

tests:
- package_contents:
    lib:
    - libtiff.a
    - libtiffxx.a
    include:
    - tiff.h
    - tiffio.h

about:
  license: HPND
  license_file: LICENSE.md
  summary: Support for the Tag Image File Format (TIFF).
  description: |
    This software provides support for the Tag Image File Format (TIFF), a
    widely used format for storing image data.
  homepage: http://www.libtiff.org/
extra:
  recipe-maintainers:
  - DerThorsten
