context:
  name: ecm
  version: 7.0.7

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://gitlab.inria.fr/zimmerma/ecm/-/archive/git-${{ version }}/ecm-git-${{ version }}.tar.gz
  sha256: cfc1c0745694e7b24a8a373d8e854f8ab42cff177dbd98beba3b093e3858ca8a

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler('cxx') }}
  host:
  - gmp

tests:
- package_contents:
    files:
    - lib/libecm.a
    - include/ecm.h
    - bin/ecm
    - bin/ecm.wasm

about:
  homepage: https://gitlab.inria.fr/zimmerma/ecm
  license: GPL-3.0-only
  license_file: COPYING
  summary: The elliptic curve factorization method (ECM) is the fastest way to factor a known composite integer if one of the factors is relatively small (up to approximately 80 bits / 25 decimal digits).

extra:
  recipe-maintainers:
  - wangyenshu