context:
  name: lakers-python
  version: 0.6.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name|replace('-','_') }}-${{ version }}.tar.gz
  sha256: 578eda322e8b5e94c5048454e15d1fa90e718e83b77a96b3ebd31071954c2ec8

build:
  number: 0

requirements:
  build:
  - cross-python_${{ target_platform }}
  - cffi == 1.17.1
  - setuptools-rust
  - rust
  - maturin
  host:
  - python
  - cffi == 1.17.1
  run:
  - cffi == 1.17.1

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_import_lakers.py

about:
  summary: Python wrapper for the lakers crate (EDHOC implementation in Rust)
  license: BSD-3-Clause
  license_file: LICENSE.md
  homepage: https://crates.io/crates/lakers
  repository: https://github.com/lake-rs/lakers
