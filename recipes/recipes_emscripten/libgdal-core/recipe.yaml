context:
  name: libgdal-core
  version: 3.13.0

source:
  url: https://github.com/OSGeo/gdal/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3c80190e6f21ca69f960acbb564e8649f1829f52b506aa3d7474c1e3abfb812b
  patches:
  - patches/0001-Add-CPL_CPUID-guards.patch

build:
  number: 0

outputs:
- package:
    name: ${{ name }}
    version: ${{ version }}
  build:
    script: build.sh
  requirements:
    build:
    - ${{ compiler('c') }}
    - cmake
    - pkg-config
    host:
    - libtiff
    - proj-static
    - libiconv
    - geos-static
    - libpng
  tests:
  - package_contents:
      files:
      - lib/libgdal.so

- package:
    name: ${{ name }}-static
    version: ${{ version }}
  build:
    script: build_static.sh
  requirements:
    build:
    - ${{ compiler('c') }}
    - cmake
    - pkg-config
    host:
    - libtiff
    - proj-static
    - libiconv
    - geos-static
    - libpng
  tests:
  - package_contents:
      files:
      - lib/libgdal.a

about:
  homepage: https://gdal.org/
  license: MIT
  license_file: LICENSE.TXT

extra:
  recipe-maintainers:
  - DerThorsten
  - IsabelParedes
