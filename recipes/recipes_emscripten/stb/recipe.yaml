context:
  version: "31c1ad37456438565541f4919958214b6e762fb4"

package:
  name: stb
  version: ${{ version }}

source:
- url: https://github.com/nothings/stb/archive/${{ version }}.tar.gz
  sha256: e4e3bba9c572a4a4148373a914d88ea0f0d11de8cc2c66739926e7eca0223319

build:
  number: 0
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}

tests:
- package_contents:
    files:
    - include/stb_image.h
    - include/stb_image_write.h
    - include/stb_truetype.h
    - include/stb_ds.h
    - include/stb_sprintf.h
    - include/stb_rect_pack.h
    - include/stb_image_resize2.h
    - lib/libstb_vorbis.a
    - lib/cmake/stb/stbConfig.cmake
    - lib/cmake/stb/stbTargets.cmake
- script:
  - build_tests.sh
  requirements:
    build:
    - ${{ compiler('c') }}
    - cmake
    - make
  files:
    recipe:
    - build_tests.sh
    - tests/

about:
  homepage: https://github.com/nothings/stb
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Single-file public domain libraries for C/C++
  description: |
    stb is a collection of single-file header libraries for C/C++ covering
    image loading (PNG, JPG, BMP, TGA, GIF, HDR, PIC), writing, resizing,
    TrueType font parsing and rasterization, dynamic containers, sprintf,
    Perlin noise, rectangle packing, voxel rendering, and more.
    All libraries are in the public domain with optional MIT licensing.
  documentation: https://github.com/nothings/stb#readme
  repository: https://github.com/nothings/stb

extra:
  recipe-maintainers:
  - Alex-PLACET
