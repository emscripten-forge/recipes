context:
  version: '2.19'
  name: lcms2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/mm2/Little-CMS/releases/download/lcms${{ version }}/lcms2-${{ version }}.tar.gz
  sha256: 49e7e134e4299733dd0eda434fa468997a28ab3d33fa397c642b03644f552216

build:
  number: 0

  files:
    exclude:
    - share/man/man1/**
requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake
  - make
  host:
  - libjpeg-turbo
  - libtiff

tests:
- package_contents:
    files:
    - include/lcms2.h
    - include/lcms2_plugin.h
    - lib/liblcms2.a
    - lib/liblcms2.so

about:
  homepage: http://www.littlecms.com/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Open Source Color Management Engine

extra:
  recipe-maintainers:
  - DerThorsten

