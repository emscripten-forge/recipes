context:
  name : Biostrings
  version: 2.80.1

package:
  name: bioconductor-${{ name | lower }}
  version: ${{ version }}

source:
  url: https://www.bioconductor.org/packages/release/bioc/src/contrib/${{ name }}_${{ version }}.tar.gz
  sha256: 7656d82b3726ae4f57ef22d059353b5bfcab0d0166c48671ba38cf54a7b4d069

build:
  number: 0
  skip: ${{ r_base == '4.6.0' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - bioconductor-biocgenerics
  - bioconductor-s4vectors
  - bioconductor-iranges
  - bioconductor-xvector
  - bioconductor-seqinfo
  host:
  - r-base ==${{ r_base }}
  - bioconductor-biocgenerics
  - bioconductor-s4vectors
  - bioconductor-iranges
  - bioconductor-xvector
  - bioconductor-seqinfo
  - zlib
  run:
  - bioconductor-biocgenerics
  - bioconductor-s4vectors
  - bioconductor-iranges
  - bioconductor-xvector
  - bioconductor-seqinfo

tests:
- package_contents:
    lib:
    - R/library/${{ name }}/libs/${{ name }}.so
- script: run_r_test 
  files:
    recipe:
    - test_import.R
  requirements:
    build:
    - r-wasm-tester
about:
  repository: https://git.bioconductor.org/packages/XVector
  license: Artistic-2.0
  license_file: LICENSE
  summary: Provides memory efficient S4 classes for storing sequences "externally" (e.g. behind an R external pointer, or on disk).



extra:
  recipe-maintainers:
  - DerThorsten
