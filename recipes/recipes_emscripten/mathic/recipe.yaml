context:
  commit: 66b5d74f8417459414cbf3753cfa9a0128483cbd
  version: 0.0.0.dev${{ commit[:7] }}

package:
  name: mathic
  version: ${{ version }}

source:
  git: https://github.com/broune/mathic.git
  branch: master
  depth: 1

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - pkg-config
  - ${{ compiler('cxx') }}
  host:
  - memtailor

tests:
- package_contents:
    files:
    - lib/libmathic.a
    - include/mathic.h

about:
  repository: https://github.com/broune/mathic
  summary: Mathic is a C++ library of fast data structures designed for use in Groebner basis computation.

extra:
  recipe-maintainers:
  - wangyenshu