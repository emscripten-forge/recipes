context:
  version: 1.18.2.1
  name: r-data.table

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 7663893a84b3e22ff23efb4658bf7809ea4ff5551659cae96f264ae1a2b815a2

build:
  number: 3
  script: $R CMD INSTALL $R_ARGS .

  files:
    exclude:
    - '**/tests/**'
requirements:
  build:
  - cross-r-base_${{ target_platform }}
  - ${{ compiler('c') }}
  host:
  - zlib
  run:
  - zlib

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] | replace('.', '_') }}.so

about:
  homepage: http://r-datatable.com/
  repository: https://github.com/Rdatatable/data.table
  license: MPL-2.0
  license_file: LICENSE
  summary: R's data.table package extends data.frame
  description: |
    data.table provides a high-performance version of base R's data.frame with
    syntax and feature enhancements for ease of use, convenience and programming
    speed.

extra:
  recipe-maintainers:
  - IsabelParedes
