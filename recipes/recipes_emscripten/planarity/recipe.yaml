context:
  name: planarity
  version: 5.0.0.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/graph-algorithms/edge-addition-planarity-suite/releases/download/Version_${{ version }}/planarity-${{ version }}.tar.gz
  sha256: 8aa3958f92e3fbbc63815e5b6b454abe40889af5aa35da8306659c58ec16a2d0

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - pkg-config
  - autoconf-archive
  - ${{ compiler('cxx') }}

tests:
- package_contents:
    files:
    - lib/libplanarity.a
    - include/planarity/graphLib.h

about:
  homepage: https://github.com/graph-algorithms/edge-addition-planarity-suite
  license: LicenseRef-planarity
  license_file: LICENSE.TXT
  summary: implementations of the edge addition planar graph embedding algorithm and related algorithms

extra:
  recipe-maintainers:
  - wangyenshu