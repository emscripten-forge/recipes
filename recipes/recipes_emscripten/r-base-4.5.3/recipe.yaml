context:
  name: r-base
  version: 4.5.3
  build_number: 6
  build_variant_prefix: ${{ "static_libpython_h" if r_base_static_libpython == "1" else "h" }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://cran.r-project.org/src/base/R-4/R-${{ version }}.tar.gz
  sha256: aa5c1ed4293c7271ac513d654670356ac0e8a6ad5e42be014365d11150b5b8f2
  patches:
  # https://github.com/IsabelParedes/r-source/tree/R-4.5.0-wasm
  - patches/0001-Add-emscripten-platform-to-configure-script.patch
  - patches/0002-Disable-libcurl.patch
  - patches/0003-Disable-internet-module.patch
  - patches/0004-Fix-iconv-checks-when-using-internal-lapack-blas.patch
  - patches/0005-Add-sigsuspend-stub-for-Emscripten-compatibility.patch
  - patches/0006-Disable-which-for-emscripten.patch
  - patches/0007-Set-cairo-as-default-bitmap-type.patch
  - patches/0008-Use-source-files-directly.patch
  - patches/0009-Install-.wasm-files.patch
  - patches/0010-Fix-extern-C-error-expected-an-identifier.patch
  - patches/0011-Remove-png-lib-from-bitmap-libs.patch
  - patches/0012-Use-linux-executables.patch
  - patches/0013-Use-source-files-when-installing.patch
  - patches/0014-Fix-cairo-font-scaling-in-emscripten.patch

build:
  number: 6
  # Explicit build strings so downstream recipes can pin the static-libpython
  # variant, e.g. `r-base ==${{ version }} static_libpython*`.
  string: ${{ build_variant_prefix ~ (hash ~ "_" ~ build_number) }}

  # Pass the variant into build.sh (not inferred from the script by rattler-build).
  script:
    file: build.sh
    env:
      R_BASE_STATIC_LIBPYTHON: ${{ r_base_static_libpython }}

  variant:
    # Ensure rattler-build includes this key in the variant matrix.
    use_keys:
    - r_base_static_libpython
    # Deprioritize the static-libpython variant so the default build stays
    # preferred by the solver (via down_prioritize_variant / track_features).
    down_prioritize_variant: ${{ 1 if r_base_static_libpython == "1" else 0 }}

  files:
    exclude:
    - share/man/man1/**

requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - ${{ compiler('fortran') }}
  - libtool
  - pkg-config
  - cmake
  - make
  # Dependencies to build R in the build environment
  - libflang-rt
  - gcc
  - libiconv
  - zlib
  - bzip2
  - xz
  - pcre2
  - libpng
  - libtiff
  - cairo
  host:
  - libflang
  - libiconv
  - zlib
  - bzip2
  - liblzma
  - pcre2
  - libpng
  - libtiff
  - cairo
  - fontconfig
  - pixman
  - expat
  - freetype
  # Static libpython for the wasm target (emscripten has no shared libpython).
  # Linked into the R executable via MAIN_LDFLAGS in config.site, not libR.so.
  - if: r_base_static_libpython == "1"
    then:
    - python
    - libpython
    - libffi
    - sqlite
    - openssl
    - zstd
  run:
  - if: r_base_static_libpython == "1"
    then:
    - python
    - libpython
    - zstd
  run_exports:
  - ${{ pin_subpackage('r-base', upper_bound='x.x') }}

tests:
- package_contents:
    lib:
    - R/lib/libR.so
    - R/lib/libRblas.so
    - R/lib/libRlapack.so
    - R/library/grDevices/libs/cairo.so
- script:
  - node ${PREFIX}/lib/R/bin/Rscript --version
  requirements:
    build:
    - nodejs

about:
  homepage: http://www.r-project.org/
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: |
    R is a free software environment for statistical computing and graphics.

extra:
  recipe-maintainers:
  - IsabelParedes

