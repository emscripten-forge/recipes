context:
  name: r-ranger
  version: "0.18.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/ranger_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/ranger_${{ version }}.tar.gz
  sha256: 94c5e4c67cd92292bbba72e71d1a89be6ddea1a0d7b8e7ad452e0609b675b44d

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .
  skip: ${{ r_base == '4.6.0' }}

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - r-matrix
  - r-rcpp
  - r-rcppeigen
  host:
  - r-base ==${{ r_base }}
  - r-matrix
  - r-rcpp
  - r-rcppeigen
  run:
  - r-matrix
  - r-rcpp
  - r-rcppeigen

tests:
- package_contents:
    lib:
    - R/library/ranger/libs/ranger.so
- script: run_r_test test_ranger.R
  files:
    recipe:
    - test_ranger.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://imbs-hl.github.io/ranger/
  repository: https://github.com/imbs-hl/ranger
  license: GPL-3.0-only
  license_file: GPL-3
  summary: A Fast Implementation of Random Forests

extra:
  recipe-maintainers:
  - anutosh491
