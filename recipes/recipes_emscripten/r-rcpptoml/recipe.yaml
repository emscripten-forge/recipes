context:
  name: r-rcpptoml
  version: 0.2.3
  ccName: RcppTOML

package:
  name: ${{ name }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
    - https://cran.r-project.org/src/contrib/${{ ccName }}_${{ version }}.tar.gz
    - https://cloud.r-project.org/src/contrib/Archive/${{ ccName }}/${{ ccName }}_${{ version }}.tar.gz
  sha256: 2ed594253c562bef7065e67d791197f61b221e545206a1b3598d46868cf5926f
build:
  number: 0
  # Dependencies not yet available for R 4.6.0 on conda-forge
  skip: ${{ r_base == '4.6.0' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - ${{ compiler('c') }}
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - r-rcpp >=0.11.5
  host:
  - r-rcpp >=0.11.5
  run:
  - r-rcpp >=0.11.5
tests:
- package_contents:
    lib:
    - R/library/${{ ccName }}/libs/${{ ccName }}.so
- script: run_r_test
  files:
    recipe:
    - test_import.R
  requirements:
    build:
    - r-wasm-tester
about:
  homepage:  https://dirk.eddelbuettel.com/code/rcpp.toml.html
  license: GPL-2.0-or-later
  license_file: GPL-2
  license_family: GPL
  summary: The configuration format defined by 'TOML' (which expands to "Tom's Obvious Markup Language") specifies an excellent format (described at <https://toml.io/en/>) suitable for both human editing as well as the common uses of a machine-readable format. This package uses 'Rcpp' to connect the 'cpptoml' parser written
    by Chase Geigle (in C++11) to R.

extra:
  recipe-maintainers:
  - DerThorsten