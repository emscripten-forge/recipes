context:
  name: pari
  version: 2.17.4

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pari.math.u-bordeaux.fr/pub/pari/unix/pari-${{ version }}.tar.gz
  sha256: 02651d99c391007d384b3fadbc20abc6916b77036f9e496c99e9ce8688ca4b53

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - pkg-config
  - autoconf-archive
  - ${{ compiler('cxx') }}
  host:
  - gmp
  - readline
  - ncurses

tests:
- package_contents:
    files:
    - lib/libpari.a
    - bin/gp-sta.js
    - bin/gp-sta.wasm
    - include/pari/pari.h

about:
  homepage: https://pari.math.u-bordeaux.fr/
  license: GPL-2.0-only
  license_file: COPYING
  summary: PARI/GP is a cross platform and open-source computer algebra system designed for fast computations in number theory

extra:
  recipe-maintainers:
  - wangyenshu
