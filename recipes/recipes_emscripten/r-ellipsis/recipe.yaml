context:
  name: r-ellipsis
  version: 0.3.3

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: da1782bce5c1baf1cf8c69877078db51fabf2693a393b55ff044fd2e32966873

build:
  number: 5
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }}
  - r-rlang
  host:
  - r-rlang
  run:
  - r-rlang

tests:
- package_contents:
    files:
    - lib/R/library/${{ name[2:] }}/DESCRIPTION

about:
  homepage: https://ellipsis.r-lib.org
  repository: https://github.com/r-lib/ellipsis
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Tools for Working with ...
  description: |
    The ellipsis is a powerful tool for extending functions. Unfortunately this
    power comes at a cost: misspelled arguments will be silently ignored. The
    ellipsis package provides a collection of functions to catch problems and
    alert the user.

extra:
  recipe-maintainers:
  - IsabelParedes
  - anutosh491
