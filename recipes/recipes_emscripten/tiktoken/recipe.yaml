context:
  name: tiktoken
  version: 0.13.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.io/packages/source/t/${{ name }}/tiktoken-${{ version }}.tar.gz
  sha256: c9435714c3a84c2319499de9a300c0e604449dd0799ff246458b3bb6a7f433c1

build:
  number: 0

  files:
    exclude:
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - cross-python_${{target_platform}}
  - setuptools-rust
  - rust-nightly
  - cargo-bundle-licenses
  host:
  - python
  run:
  - regex

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_tiktoken.py

about:
  homepage: https://github.com/openai/tiktoken
  repository: https://github.com/openai/tiktoken
  summary: tiktoken is a fast BPE tokeniser for use with OpenAI's models
  license: MIT
  license_file:
  - LICENSE
  - THIRDPARTY.yml
