context:
  version: 10.0.2

package:
  name: scip
  version: ${{ version }}

source:
  url: https://github.com/scipopt/scip/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 685eb4db00ed9106b29d7e0ab1c41d78b5e4366ac66ce1a11fb3f8baa507ef20

build:
  number: 0

requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake
  - ninja
  host:
  - boost-cpp
  - gmp
  - mpfr
  - zlib
  - soplex
  # omitted for now: papilo

tests:
- script:
  - test -d ${PREFIX}/include/scip
- package_contents:
    files:
    - lib/libscip.a

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Mixed integer programming solver
  homepage: https://github.com/scipopt/scip

extra:
  recipe-maintainers:
  - mkoeppe
