context:
  version: 1.4.3
  name: r-dials

package:
  name: ${{ name | lower }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 7242dcd2d50ac2bc2f23d319e3ac12b9a81d859596ab8f83ef68108e5b574c55

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .
  skip: ${{ r_base == '4.6.0' }} 
requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-dicedesign
  - r-cli
  - r-dplyr >=0.8.5
  - r-glue
  - r-hardhat >=1.1.0
  - r-lifecycle
  - r-pillar
  - r-purrr
  - r-rlang >=1.1.0
  - r-scales >=1.3.0
  - r-sfd
  - r-tibble
  - r-vctrs >=0.3.8
  - r-withr
  host:
  - r-base ==${{ r_base }}
  - r-dicedesign
  - r-cli
  - r-dplyr >=0.8.5
  - r-glue
  - r-hardhat >=1.1.0
  - r-lifecycle
  - r-pillar
  - r-purrr
  - r-rlang >=1.1.0
  - r-scales >=1.3.0
  - r-sfd
  - r-tibble
  - r-vctrs >=0.3.8
  - r-withr
  run:
  - r-dicedesign
  - r-cli
  - r-dplyr >=0.8.5
  - r-glue
  - r-hardhat >=1.1.0
  - r-lifecycle
  - r-pillar
  - r-purrr
  - r-rlang >=1.1.0
  - r-scales >=1.3.0
  - r-sfd
  - r-tibble
  - r-vctrs >=0.3.8
  - r-withr

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so
- script: run_r_test 
  files:
    recipe:
    - test_import.R
  requirements:
    build:
    - r-wasm-tester
about:
  homepage: https://tidymodels.github.io/dials
  license:  MIT
  license_family: MIT
  license_file: LICENSE
  summary: Many models contain tuning parameters (i.e. parameters that cannot be directly estimated from the data). These tools can be used to define objects for creating, simulating, or validating values for such parameters.

extra:
  recipe-maintainers:
    - DerThorsten
