context:
  version: 1.5.0
  name: r-readxl

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
    - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
    - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 908347d27f455ba6f42dc0b0619656166cfd916b3e2cffee4eff867ce5014ce7

build:
  number: 1
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-cellranger
  - r-tibble
  - r-cpp11
  - r-progress
  host:
  - r-base ==${{ r_base }}
  - r-cellranger
  - r-tibble
  - r-cpp11
  - r-progress
  run:
  - r-cellranger
  - r-tibble
  - r-cpp11
  - r-progress

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so

about:
  homepage: https://readxl.tidyverse.org/
  repository: https://github.com/tidyverse/readxl
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Read excel files (.xls and .xlsx) into R
  description: |
    Import excel files into R. Supports '.xls' via the embedded 'libxls' C
    library <https://github.com/libxls/libxls> and '.xlsx' via the embedded
    'RapidXML' C++ library <https://rapidxml.sourceforge.net/>. Works on
    Windows, Mac and Linux without external dependencies.

extra:
  recipe-maintainers:
    - IsabelParedes
