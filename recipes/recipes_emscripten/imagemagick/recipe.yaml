context:
  version: 7.1.2-20
package:
  name: imagemagick
  version: ${{ version | replace("-","_") }}

source:
  url: https://github.com/ImageMagick/ImageMagick/archive/${{ version}}.tar.gz
  sha256: 48807257a0af46a630964c4b771ba5a957fe3063cfd6e2ba991c253e891387a3
build:
  number: 0

  files:
    exclude:
    - share/man/man1/**
requirements:
  build:
  - libtool
  - ${{ compiler('c') }}
  - make
  - pkg-config
  host:
  - libtiff
  - libpng
  - libjpeg-turbo
  - bzip2
  - libxml2
  - openjpeg
  - zlib

tests:
- package_contents:
    files:
    - lib/libMagick++-7.Q8.a
    - include/ImageMagick-7/Magick++.h

about:
  homepage: http://www.imagemagick.org/
  license: AGPL-3.0-only
  license_file: LICENSE
  summary: Software suite to create, edit, compose, or convert bitmap images.

