context:
  version: 10.8.3

source:
- url: https://pypi.org/packages/source/p/passagemath-environment/passagemath_environment-${{ version }}.tar.gz
  sha256: 1a0304f908ab02900f441996f79826258f1386ec9041c15ec37ff7894fc44ee8

build:
  number: 0

outputs:
- package:
    name: passagemath-environment
    version: ${{ version }}

  build:
    script: ${{ PYTHON }} -m pip install .
    noarch: python

  requirements:
    build:
    - python
    - crossenv >=1.2
    - cross-python_emscripten-wasm32
    - ${{ compiler("c") }}
    - pip
    - passagemath-abi == ${{ version }}
    host:
    - python
    - setuptools
    - wheel
    - pip
    run:
    - python
    - packaging
    - platformdirs
    - passagemath-abi == ${{ version }}

  tests:
  - script: pytester
    files:
      recipe:
      - test_passagemath_environment.py
    requirements:
      build:
      - pytester
      run:
      - pytester-run

- package:
    name: passagemath-abi
    version: ${{ version }}

  build:
    noarch: generic
    script: echo "passagemath-abi is built"
  requirements:
    run_exports:
      strong:
      - ${{ pin_subpackage('passagemath-abi', exact=True) }}
  tests:
  - script: echo "passagemath-abi is an empty package."

about:
  summary: 'passagemath: System and software environment'
  license: GPL-2.0-or-later
  license_file: README.rst
  description: |
    Distribution of a small part of the Sage library.
    It provides the connection to the system and software environment.

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_environment.py
  recipe-maintainers:
  - mkoeppe
