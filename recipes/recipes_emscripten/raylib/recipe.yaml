context:
  name: raylib
  version: '6.0'

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/raysan5/raylib/archive/refs/tags/${{ version }}.tar.gz
  sha256: 2b3ee1e2120c7a0796b33062c7e9a694dd8a8caa56a96319ac8c8ecf54a90d0b

build:
  number: 0

requirements:
  build:
  - ${{ compiler('cxx') }}
  - cmake
  - ninja

tests:
- package_contents:
    files:
    - include/raylib.h
    - include/raymath.h
    - lib/libraylib.a

about:
  homepage: https://github.com/raysan5/raylib
  license: Zlib
  license_file: LICENSE

extra:
  recipe-maintainers:
  - DerThorsten
