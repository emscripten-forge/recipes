context:
  name: r-splus2r
  version: '1.3-5'

package:
  name: ${{ name }}
  version: ${{ version|replace("-", "_") }}

source:
  url:
  - https://cran.r-project.org/src/contrib/splus2R_${{ version }}.tar.gz
  - https://cran.r-project.org/src/contrib/Archive/splus2R/splus2R_${{ version }}.tar.gz
  sha256: e7b0ea5672c5480424b056f3c30edc7858f868d3e2d7f5a3593e17fed5bfeb24

build:
  number: 0
  skip: ${{ r_base == '4.6.0' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  host:
  - r-base ==${{ r_base }}



tests:
- package_contents:
    lib:
    - R/library/splus2R/libs/splus2R.so
- script: run_r_test 
  files:
    recipe:
    - test_splus2r.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://CRAN.R-project.org/package=splus2R
  license:  GPL-2.0-only
  license_file: GPL-2
  summary:  adds some missing S-PLUS functionality to R
  description: |
    Currently there are many functions in S-PLUS that are missing in R. 
    To facilitate the conversion of S-PLUS packages to R packages,
    this package provides some missing S-PLUS functionality in R.
  license_family: GPL2

extra:
  recipe-maintainers:
  - DerThorsten
