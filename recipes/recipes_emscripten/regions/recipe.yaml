context:
  name: regions
  version: '0.12'

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/r/regions/regions-${{ version }}.tar.gz
  sha256: 1c9460770f250ef299e90a9d5c0b35941f7d05bbf879f6ffaa0538250c018ef9

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . ${{ PIP_ARGS }}

  files:
    exclude:
    - '**/tests/**'
    - '**/*.pyx'
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'

requirements:
  build:
  - python
  - cross-python_${{ target_platform }}
  - cython
  - numpy
  - ${{ compiler('c') }}
  host:
  - python
  - pip
  - setuptools
  - setuptools_scm >=8.0
  - cython
  - extension-helpers
  - numpy
  - astropy >=6.0
  run:
  - python
  - numpy
  - astropy >=6.0

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_regions.py

about:
  homepage: https://astropy-regions.readthedocs.io
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: Astropy coordinated package for region handling
  description: |
    Regions is a package for region handling based on Astropy. The
    eventual goal is to merge this package into the Astropy core
    package.

extra:
  recipe-maintainers:
  - astrofrog
  - bsipocz
  - mwcraig
