context:
  version: 2.5.1


package:
  name: doctest
  version: ${{ version }}

source:
  url: https://github.com/onqtam/doctest/archive/refs/tags/v${{ version }}.zip
  sha256: c801e891f0cb22f45ecd06d68bb4a7ca5e09bf0078adcafd6dc5305689d33ef9

build:
  number: 0

requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake
  - ninja

tests:
- script:
  - test -f $PREFIX/include/doctest/doctest.h
  - test -f $PREFIX/lib/cmake/doctest/doctestConfig.cmake

about:
  license: MIT
  license_file: LICENSE.txt
  summary: doctest
  homepage: https://github.com/onqtam/doctest
extra:
  recipe-maintainers:
  - DerThorsten
