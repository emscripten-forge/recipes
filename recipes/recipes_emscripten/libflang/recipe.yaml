context:
  name: libflang
  version: 22.1.5

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/llvm/llvm-project/archive/refs/tags/llvmorg-${{ version }}.tar.gz
  sha256: 263e99bd0b590664a886b0332037ff060e108f4e7b0310b7c8277208858f867d
  patches:
    # from https://github.com/serge-sans-paille/llvm-project/tree/feature/flang-wasm
    - patches/0001-Minimal-WASM-support-for-flang.patch
    - patches/0002-Specialize-Flang-to-target-WASM.patch
    - patches/0003-Deactivate-quadmath-float128-support.patch

build:
  number: 0

requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - ${{ compiler('fortran') }}
  - ninja
  - cmake

tests:
- package_contents:
    files:
    - lib/clang/*/lib/wasm32-unknown-emscripten/libflang_rt.runtime.a
    # - lib/libFortranDecimal.a

about:
  homepage: https://flang.llvm.org
  license: Apache-2.0
  license_file: flang/LICENSE.TXT
  summary: Flang is a Fortran compiler targeting LLVM.
  repository: https://github.com/llvm/llvm-project

extra:
  recipe-maintainers:
  - IsabelParedes
