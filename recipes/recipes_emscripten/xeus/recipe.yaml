context:
  version: 6.0.4

package:
  name: xeus
  version: ${{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus/archive/refs/tags/${{ version }}.tar.gz
  sha256: 5707439dae7b30c42e536f82259ee3edf26e873f44bc9b4ec3aa36f30c42093d

build:
  number: 0

requirements:
  run_exports:
  - ${{ pin_subpackage('xeus', upper_bound='x.x') }}
  build:
  - cmake
  - ${{ compiler("cxx") }}
  - make
  host:
  - nlohmann_json
  - nlohmann_json-abi

tests:
- package_contents:
    files:
    - lib/libxeus.a
    - lib/libxeus.so
    - include/xeus/xeus.hpp

about:
  license: BSD-3-Clause
  license_family: BSD-3
  license_file: LICENSE
  summary: xeus
  homepage: https://github.com/jupyter-xeus/xeus

extra:
  recipe-maintainers:
  - DerThorsten
  - JohanMabille
