context:
  version: 6.0.2

package:
  name: xeus
  version: ${{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus/archive/refs/tags/${{ version }}.tar.gz
  sha256: f38c462f082af5db11d3336171f416b9bd0fbaf3a85fb2e4a6f990d944214051

build:
  number: 0

requirements:
  run_exports:
  - ${{ pin_subpackage('xeus', upper_bound='x.x') }}
  build:
  - cmake
  - ${{ compiler("cxx") }}
  - make
  host:
  - nlohmann_json
  - nlohmann_json-abi

tests:
- package_contents:
    files:
    - lib/libxeus.a
    - lib/libxeus.so
    - include/xeus/xeus.hpp

about:
  license: BSD-3-Clause
  license_family: BSD-3
  license_file: LICENSE
  summary: xeus
  homepage: https://github.com/jupyter-xeus/xeus

extra:
  recipe-maintainers:
  - DerThorsten
  - JohanMabille
