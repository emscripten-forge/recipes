context:
  name: MASS
  version: 7.3-66

package:
  name: r-${{ name | lower }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  - https://cran.r-project.org/src/contrib/Archive/${{ name }}/${{ name }}_${{ version }}.tar.gz
  sha256: 59c619c70bfca653f1c74aef880e69405daefd0134e716a1862ecc5334b4e155

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  host:
  - r-base ==${{ r_base }}

tests:
- package_contents:
    lib:
    - R/library/${{ name }}/libs/${{ name }}.so
- script: run_r_test
  files:
    recipe:
    - test_${{ name | lower }}.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: http://www.stats.ox.ac.uk/pub/MASS4/
  repository: https://github.com/cran/MASS
  license: GPL-2.0-or-later
  license_family: GPL3
  license_file: ${{ PREFIX }}/lib/R/share/licenses/GPL-3
  summary: Support Functions and Datasets for Venables and Ripley's MASS
  description: |
    Functions and datasets to support Venables and Ripley, "Modern Applied
    Statistics with S" (4th edition, 2002).

extra:
  recipe-maintainers:
  - IsabelParedes
