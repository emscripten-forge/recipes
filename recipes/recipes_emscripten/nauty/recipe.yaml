context:
  name: nauty
  version: 2.9.3

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pallini.di.uniroma1.it/nauty${{ version | replace(".", "_") }}.tar.gz
  sha256: 9fc4edae04f88a0f5883985be3b39cf7f898fd6cc96e96b9ee25452743cc1b5b

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler('cxx') }}

tests:
- package_contents:
    files:
    - lib/libnauty.a
    - include/nauty.h
    - include/traces.h
    - bin/dreadnaut.wasm

about:
  homepage: https://pallini.di.uniroma1.it/
  license: Apache-2.0
  license_file: COPYRIGHT
  summary: nauty and Traces are programs for computing automorphism groups of graphs and digraphs.

extra:
  recipe-maintainers:
  - wangyenshu