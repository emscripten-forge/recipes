context:
  version: 0.2.2
  name: r-S7

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 6f33245dde05b74265b1c4d379e034bc3a8923d41e7b52e6e75a75ce97d42af7

build:
  number: 1
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  host:
  - r-base ==${{ r_base }}

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so

about:
  homepage: https://cran.r-project.org/package=s7
  documentation: https://rconsortium.github.io/S7/
  repository: https://github.com/rconsortium/S7
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: |
    An Object Oriented System Meant to Become a Successor to S3 and S4
  description: |
    A new object oriented programming system designed to be a successor to S3
    and S4. It includes formal class, generic, and method specification, and a
    limited form of multiple dispatch. It has been designed and implemented
    collaboratively by the R Consortium Object-Oriented Programming Working
    Group, which includes representatives from R-Core, Bioconductor,
    Posit/tidyverse, and the wider R community.

extra:
  recipe-maintainers:
  - IsabelParedes
