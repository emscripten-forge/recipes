context:
  version: 10.8.6

package:
  name: passagemath-ecl
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/passagemath-ecl/passagemath_ecl-${{ version }}.tar.gz
  sha256: 2147cc300041f146ed48b73f48bdd42e0b2abf225730bd40f74f0857c610c92f

build:
  script: |
    export ECL_CONFIG="${PREFIX}/ecl-config"
    sed -i.bak "s/'gsl', 'Singular', 'ecl'/'ecl',/" setup.py
    ${{ PYTHON }} -m pip install .
  number: 0

requirements:
  build:
  - python
  - crossenv >=1.2
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - ${{ compiler("cxx") }}
  - pip
  - passagemath-setup
  - passagemath-environment
  - cython
  - cysignals
  - pkgconfig
  - passagemath-abi == ${{ version }}
  host:
  - python
  - ecl
  - gmp
  - passagemath-categories
  run:
  - python
  - cysignals
  - passagemath-categories
  - passagemath-environment

tests:
- script: pytester
  files:
    recipe:
    - test_passagemath_ecl.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run
    - passagemath-repl

about:
  license: GPL-2.0-or-later
  license_file: README.rst
  summary: 'passagemath: Embeddable Common Lisp'
  description: |
    Distribution of a part of the Sage library.
    It provides the Python and Cython interfaces to Embeddable Common Lisp.

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_ecl.py
  recipe-maintainers:
  - mkoeppe
