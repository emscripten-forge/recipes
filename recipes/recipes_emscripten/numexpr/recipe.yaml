context:
  name: numexpr
  version: 2.14.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: e7144e83ea9e581f2273e0304f15836736c4e470e2bd2e378ce617662a1ca278

build:
  number: 0
  script: ${PYTHON} -m pip install . ${PIP_ARGS}

requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - cross-python_${{ target_platform }}
  - python
  - numpy
  - pip
  - setuptools
  host:
  - python
  - numpy
  - pip
  - setuptools
  run:
  - python
  - numpy

tests:
- script: pytester
  files:
    recipe:
    - test_import_numexpr.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run

about:
  homepage: https://github.com/pydata/numexpr
  license: MIT
  license_file: LICENSE.txt
  summary: Fast numerical expression evaluator for NumPy.
  description: |
    Numexpr is a fast numerical expression evaluator for NumPy. With it,
    expressions that operate on arrays (like "3*a+4*b") are accelerated and
    use less memory than doing the same calculation in Python.
  documentation: https://numexpr.readthedocs.io
  repository: https://github.com/pydata/numexpr

extra:
  recipe-maintainers:
  - Copilot
