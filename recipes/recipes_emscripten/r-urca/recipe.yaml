context:
  name: r-urca
  version: 1.3-4

package:
  name: ${{ name }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: fe3d6ce5041f1e7caaf3137dfb6187640bcd2d208e19c59ee1202355ac0acb16

build:
  number: 0
  # Dependencies not yet available for R 4.6.0 on conda-forge
  skip: ${{ r_base == '4.6.0' }}
  script:
  - echo "PKG_LIBS=\$(LAPACK_LIBS) \$(BLAS_LIBS)" > src/Makevars
  - $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - ${{ compiler('fortran') }}
  - r-nlme
  host:
  - libflang
  - r-base ==${{ r_base }}
  - r-nlme
  run:
  - r-nlme

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so
- script: run_r_test test_urca.R
  files:
    recipe:
    - test_urca.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://cran.r-project.org/package=urca
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: GPL-2
  summary: Unit Root and Cointegration Tests for Time Series Data
  description: |
    Unit root and cointegration tests encountered in applied econometric
    analysis are implemented.

extra:
  recipe-maintainers:
  - IsabelParedes
