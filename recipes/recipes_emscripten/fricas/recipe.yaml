context:
  name: fricas
  version: 1.3.13

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/fricas/fricas/releases/download/${{ version }}/fricas-${{ version }}-full.tar.bz2
  sha256: dd4d5e06db0ba4a43a5bfb64e94f6c8d4b10e68ac65a77556891a6b24af148a2

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - pkg-config
  - autoconf-archive
  - ${{ compiler('c') }}     
  - ${{ compiler('cxx') }}
  - ecl                     
  - nodejs
  host:
  - ecl
  - libffi

tests:
- package_contents:
    files:
    - bin/fricas

about:
  homepage: https://fricas.github.io/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: FriCAS is a general purpose computer algebra system (CAS).

extra:
  recipe-maintainers:
  - wangyenshu