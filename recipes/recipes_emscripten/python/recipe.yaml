context:
  version: 3.14.3
  name: python
  ver2: '3.14'
  ver2nd: ${{ version | version_to_buildstring}}
  build_number: 0
  abi_tag: cp${{ ver2nd }}

package:
  name: python
  version: ${{ version }}

source:
- url: https://www.python.org/ftp/python/${{ version }}/Python-${{ version }}.tar.xz
  sha256: a97d5549e9ad81fe17159ed02c68774ad5d266c72f8d9a0b5a9c371fe85d902b
  patches:
  - patches/0005-Fix-LONG_BIT-constant-to-be-always-32bit.patch
  - patches/0006-Use-emcc-for-emscripten_trampoline_inner.wasm.patch
  - patches/0007-Compat-for-missing-builtin_wasm_test_function_pointer_signature.patch
  - patches/0009-wasm_assets-allow-sysconfig-data-path-for-cross.patch
  - patches/0010-blake2-undef-HACL-SIMD-macros-for-wasm.patch
  - patches/0011-disable-uuid-generate-time-safe-on-emscripten.patch
build:
  number: ${{ build_number }}
  string: h_${{ hash }}_${{build_number}}_${{ abi_tag }}

  files:
    exclude:
    - '**/*.ini'
    - '**/ensurepip/**'
    - '**/idlelib/**'
    - '**/__pycache__/**'
    - '**/*.pyc'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - ${{ compiler("cxx") }}
  - ${{ compiler("c") }}
  - make
  - autoconf
  - nodejs
  - ccache
  - f2c
  - pkg-config
  - swig
  - make
  - cmake
  - pkg-config
  - texinfo
  - autoconf
  - automake
  - libtool
  - patch   # only needed on MacOS
  - sed   # only needed on MacOS
  - wget
  - python=3.14
  host:
  - openssl
  - libffi
  - liblzma
  - zstd
  - libuuid
  run:
  - python_abi ${{ ver2 }}.* *_${{ abi_tag }}
  run_exports:
    weak:
    - python_abi  ${{ ver2 }}.* *_${{ abi_tag }}



tests:
- script:
  - test -f $PREFIX/include/python${{ver2}}/Python.h
  - test -f $PREFIX/lib/python${{ver2}}/enum.py
  - test -f $PREFIX/lib/python${{ver2}}/ast.py
  - test -f $PREFIX/lib/libpython${{ver2}}.a
  - test -f $PREFIX/bin/python${{ver2}}

about:
  license: Python-2.0
  license_file: LICENSE
  summary: General purpose programming language
  description: |
    Python is a widely used high-level, general-purpose, interpreted, dynamic
    programming language. Its design philosophy emphasizes code
    readability, and its syntax allows programmers to express concepts in
    fewer lines of code than would be possible in languages such as C++ or
    Java. The language provides constructs intended to enable clear programs
    on both a small and large scale.
  documentation: https://github.com/python/pythondotorg/blob/master/docs/source/index.rst
  homepage: https://www.python.org/
extra:
  recipe-maintainers:
  - DerThorsten
  - KGB99
