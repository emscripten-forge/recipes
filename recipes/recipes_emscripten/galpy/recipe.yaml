context:
  name: galpy
  version: 1.12.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 368c3b6a8ca7d93e44df40887ac6b9d9a00fa3a0f2ce532d9b6dac1a43ac7612

build:
  number: 0

  files:
    exclude:
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'

requirements:
  build:
  - ${{ compiler('c') }}
  - cross-python_${{ target_platform }}
  - python
  - pip
  - setuptools
  - numpy
  - cython
  host:
  - python
  - numpy
  - pip
  - gsl
  run:
  - python
  - packaging
  - numpy
  - scipy
  - matplotlib

tests:
- script: pytester
  files:
    recipe:
    - test_import_galpy.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Galactic Dynamics in python
  homepage: http://github.com/jobovy/galpy
  documentation: https://docs.galpy.org/

extra:
  recipe-maintainers:
  - IsabelParedes
