context:
  name: gdbm
  version: '1.26'

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://ftp.gnu.org/gnu/gdbm/gdbm-${{ version }}.tar.gz
  sha256: 6a24504a14de4a744103dcb936be976df6fbe88ccff26065e54c1c47946f4a5e

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler("c") }}
  - ${{ compiler('cxx') }}
  - pkg-config
  - autoconf-archive
  - gettext

tests:
- package_contents:
    files:
    - lib/libgdbm.a
    - include/gdbm.h

about:
  homepage: https://www.gnu.org.ua/software/gdbm/gdbm.html
  license: GPL-3.0-only
  license_file: COPYING
  summary: GNU dbm (or GDBM, for short) is a library of database functions that use extensible hashing and work similar to the standard UNIX dbm.

extra:
  recipe-maintainers:
  - wangyenshu
