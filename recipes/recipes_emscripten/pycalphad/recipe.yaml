context:
  name: pycalphad
  version: 0.11.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 588ad2c0c207aa35d263c16283559eff566a8fcdf33ecdc77a9ec9176cde1378

build:
  number: 0
  script: ${PYTHON} -m pip install .

  files:
    exclude:
    - '**/tests/**'
    - '**/*.pxd'
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'

requirements:
  build:
  - cross-python_${{ target_platform }}
  - ${{ compiler('cxx') }}
  - python
  - cython
  - numpy>=2.0
  - setuptools-scm
  - scipy
  - pip
  host:
  - python
  run:
  - matplotlib
  - numpy
  - pint
  - pyparsing
  - pytest
  - python-symengine
  - runtype
  - scipy
  - tinydb
  - typing-extensions   # drop when pycalphad drops support for Python<3.13
  - xarray

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_pycalphad.py

about:
  homepage: https://pycalphad.org/
  license: MIT
  license_file: LICENSE.txt
  summary: CALPHAD tools for designing thermodynamic models, calculating phase diagrams and investigating phase 
    equilibria.
  description: |
    pycalphad is a free and open-source Python library for designing thermodynamic models, calculating phase diagrams and investigating phase equilibria within the CALPHAD method.
  documentation: https://pycalphad.org/
  repository: https://github.com/pycalphad/pycalphad

extra:
  recipe-maintainers:
  - richardotis
  - bocklund

