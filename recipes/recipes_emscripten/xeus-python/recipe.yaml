context:
  version: 0.19.0

package:
  name: xeus-python
  version: ${{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus-python/archive/refs/tags/${{ version }}.tar.gz
  sha256: 9f85288bbfea0b9087bab57c1d8d827ed0bf0323e63b94af507990c7040cad01

build:
  number: 0

requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake
  - ninja
  host:
  - python
  - libpython
  - nlohmann_json
  - nlohmann_json-abi
  - xeus
  - xeus-lite >=5.0.0
  - pybind11
  - pybind11_json
  - xtl
  - pyjs >=4.0.1
  - zstd
  run:
  - python
  - xeus-python-shell-lite >=0.7,<0.8
  - pyjs-rt >=4.0.1

tests:
- package_contents:
    files:
    - bin/xpython.wasm
    - bin/xpython.js

about:
  license: BSD-3-Clause
  license_family: BSD-3
  license_file: LICENSE
  summary: xeus-python
  homepage: https://github.com/jupyter-xeus/xeus-python

extra:
  recipe-maintainers:
  - DerThorsten
  - martinRenou
  - JohanMabille
