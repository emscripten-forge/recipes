context:
  name: rapidfuzz
  version: 3.14.5

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: ba10ac57884ce82112f7ed910b67e7fb6072d8ef2c06e30dc63c0f604a112e0e

build:
  number: 0

  files:
    exclude:
    - '**/*.pyi'
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - ${{ compiler("c") }}
  - ${{ compiler("cxx") }}
  - cross-python_emscripten-wasm32
  - cmake
  - make
  - packaging
  - scikit-build-core
  - setuptools
  - pip
  host:
  - python
  run:
  - python
  - numpy

about:
  homepage: https://github.com/rapidfuzz/RapidFuzz
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Rapid fuzzy string matching in Python using various string metrics
  repository: https://github.com/rapidfuzz/RapidFuzz
  documentation: https://rapidfuzz.github.io/RapidFuzz/

tests:
- script: pytester
  requirements:
    build:
    - pytester >= 0.9.0
    run:
    - pytester-run >= 0.9.0
  files:
    recipe:
    - test_rapidfuzz.py

extra:
  recipe-maintainers:
  - michaelweinold
  - DerThorsten
