context:
  version: 1.4.0
  name: ligo-segments

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: e072a844713c5b02efdcaf5bfe4c3a8cd9ef225b08cfd3202a4e185e0f71f5dc
  patches:
    - patches/0001-use-PEP-420-implicit-namespace-packages.patch
    - patches/0004-Initialize-PyTypeObjects-with-PyVarObject_HEAD_INIT.patch
    - patches/0005-Fix-build-for-Python-3.13.patch
    # -patches/0002-add-macro-to-fix-building-on-windows.patch
    # -patches/0003-avoid-imports-of-lal-for-windows.patch
    # -patches/0004-fix-imcompatible-pointer-error-for-Python-3.12.patch

build:
  number: 0
  script: "${{ PYTHON }} -m pip install . -vv"


  files:
    exclude:
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - python
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - pip
  host:
  - python
  run:
  - python
  - six

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_ligo_segments.py


about:
  homepage:  https://git.ligo.org/lscsoft/ligo-segments/
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary:  Representations of semi-open intervals
extra:
  recipe-maintainers:
  - DerThorsten
