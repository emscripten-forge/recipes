context:
  name: r-nlme
  version: 3.1-170

package:
  name: ${{ name }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: d8e1a92cc295b046c9fd12bc1b875fe7921cc1db58f4407f0b97d625e8197b44

build:
  number: 0
  # Dependencies not yet available for R 4.6.x on conda-forge
  skip: ${{ r_base == '4.6.1' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - ${{ compiler('c') }}
  - ${{ compiler('fortran') }}
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - r-lattice
  host:
  - r-base ==${{ r_base }}
  - r-lattice
  - libflang
  run:
  - r-lattice

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so

about:
  homepage: https://svn.r-project.org/R-packages/trunk/nlme
  license: GPL-2.0-or-later
  license_file: GPL-3
  license_family: GPL3
  summary: Linear and Nonlinear Mixed Effects Models
  description: |
    Fit and compare Gaussian linear and nonlinear mixed-effects models.

extra:
  recipe-maintainers:
  - IsabelParedes
  - anutosh491
