context:
  name: simplejson
  version: 4.1.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 7b3ce1e8f13ec3cd41e31c45c2172caa4c66299c7002d3e0871b49a85683157e

build:
  number: 0
  script: ${PYTHON} -m pip install . ${PIP_ARGS}

  files:
    exclude:
    - '**/tests/**'
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - ${{ compiler("cxx") }}
  - cross-python_${{ target_platform }}
  - python
  - cython
  - numpy
  - pip
  - extension-helpers
  host:
  - numpy
  - python

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_simplejson.py

about:
  homepage: http://github.com/simplejson/simplejson
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: Simple, fast, extensible JSON encoder/decoder for Python
  description: |
    Simplejson is a simple, fast, complete, correct and extensible JSON
    <http://json.org> encoder and decoder for Python 2.5+ and Python 3.3+. It is
    pure Python code with no dependencies, but includes an optional C extension
    for a serious speed boost.

extra:
  recipe-maintainers:
  - DerThorsten
