context:
  name: linbox
  version: 1.7.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/linbox-team/linbox/releases/download/v${{ version }}/linbox-${{ version }}.tar.gz
  sha256: a2b5f910a54a46fa75b03f38ad603cae1afa973c95455813d85cf72c27553bd8

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler("c") }}
  - ${{ compiler('cxx') }}
  - pkg-config
  - autoconf-archive
  host:
  - gmp 
  - givaro
  - fflas-ffpack
  - libblas
  - ntl
  - libflint

tests:
  - package_contents:
      files:
        - include/linbox/linbox-config.h
        - lib/pkgconfig/linbox.pc
        - bin/linbox-config

about:
  homepage: https://linbox-team.github.io/linbox
  license: LGPL-2.1-only AND GPL-2.0-only
  license_file: COPYING
  summary: The Linbox library provides functionalities for exact linear algebra.

extra:
  recipe-maintainers:
  - wangyenshu