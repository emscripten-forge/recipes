context:
  version: 10.8.5

package:
  name: passagemath-iml
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/passagemath-iml/passagemath_iml-${{ version }}.tar.gz
  sha256: 4a455fd2c3726a0c35c7396ffc3996bfde81a78ea5eeabb02c434d9d1259c5c2

build:
  script: ${{ PYTHON }} -m pip install .
  number: 0

requirements:
  build:
  - python
  - crossenv >=1.2
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - ${{ compiler("cxx") }}
  - pip
  - passagemath-setup
  - passagemath-environment
  - cython
  - cysignals
  - pkgconfig
  - numpy
  - passagemath-abi == ${{ version }}
  host:
  - python
  - gmp
  - mpfr
  - mpc
  - libflint
  - iml
  - numpy
  - cysignals
  - memory-allocator
  - mpmath
  - passagemath-categories
  - passagemath-flint
  - passagemath-modules
  run:
  - python
  - conway-polynomials
  - cysignals
  - memory-allocator
  - passagemath-categories
  - passagemath-environment
  - passagemath-flint
  - passagemath-modules

tests:
- script: pytester
  files:
    recipe:
    - test_passagemath_iml.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run
    - passagemath-modules
    - passagemath-repl

about:
  license: GPL-2.0-or-later
  license_file: README.rst
  summary: 'passagemath: Linear Algebra with IML'
  description: |
    Distribution of a part of the Sage library.
    It provides modules that depend on the library IML.

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_iml.py
  recipe-maintainers:
  - mkoeppe
