context:
  version: 1.4-30
  name: r-multicomp

package:
  name: ${{ name | lower }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 4b24316f221784a8915a26e4b744d0299f1c4d3058c4c7e8faccc16333be495c

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .


requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-th.data >=1.0_2
  - r-codetools
  - r-mvtnorm >=1.0_10
  - r-sandwich >=2.3_0
  - r-survival >=2.39_4
  host:
  - r-base ==${{ r_base }}
  - r-th.data >=1.0_2
  - r-codetools
  - r-mvtnorm >=1.0_10
  - r-sandwich >=2.3_0
  - r-survival >=2.39_4
  run:
  - r-th.data >=1.0_2
  - r-codetools
  - r-mvtnorm >=1.0_10
  - r-sandwich >=2.3_0
  - r-survival >=2.39_4

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so
- script: run_r_test 
  files:
    recipe:
    - test_import.R
  requirements:
    build:
    - r-wasm-tester
about:
  homepage: http://multcomp.R-forge.R-project.org
  license:  GPL-2.0-only
  license_family: GPL2
  license_file: GPL-2
  summary: |
    Simultaneous tests and confidence intervals for general linear hypotheses in parametric models, including  linear, generalized linear, linear mixed effects, and survival models. The package includes demos reproducing analyzes presented in the book "Multiple Comparisons Using R" (Bretz, Hothorn,  Westfall, 
    2010, CRC Press).
extra:
  recipe-maintainers:
    - DerThorsten
