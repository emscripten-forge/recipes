context:
  name: r-forecast
  version: 9.0.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 86dadffb846903b83fa6471d4e33d29e37435cc492641963a5b1daa925150653

build:
  number: 0
  # Dependencies not yet available for R 4.6.0 on conda-forge
  skip: ${{ r_base == '4.6.0' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-colorspace
  - r-rcpp
  - r-rcpparmadillo
  - r-fracdiff
  - r-generics
  - r-ggplot2
  - r-lmtest
  - r-magrittr
  - r-nnet
  - r-rcpp
  - r-timedate
  - r-urca
  - r-withr
  - r-zoo
  host:
  - libflang
  - r-base ==${{ r_base }}
  - r-colorspace
  - r-rcpp
  - r-rcpparmadillo
  - r-fracdiff
  - r-generics
  - r-ggplot2
  - r-lmtest
  - r-magrittr
  - r-nnet
  - r-rcpp
  - r-timedate
  - r-urca
  - r-withr
  - r-zoo
  run:
  - r-colorspace
  - r-rcpp
  - r-rcpparmadillo
  - r-fracdiff
  - r-generics
  - r-ggplot2
  - r-lmtest
  - r-magrittr
  - r-nnet
  - r-rcpp
  - r-timedate
  - r-urca
  - r-withr
  - r-zoo

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so
- script: run_r_test test_forecast.R
  files:
    recipe:
    - test_forecast.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://cran.r-project.org/package=forecast
  repository: https://github.com/robjhyndman/forecast
  documentation: https://pkg.robjhyndman.com/forecast/
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: GPL-2
  summary: Forecasting Functions for Time Series and Linear Models
  description: |
    Methods and tools for displaying and analysing univariate time series
    forecasts including exponential smoothing via state space models and
    automatic ARIMA modelling.

extra:
  recipe-maintainers:
  - IsabelParedes
