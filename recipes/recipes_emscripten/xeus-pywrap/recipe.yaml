context:
  version: 0.1.0

package:
  name: xeus-pywrap
  version: ${{ version }}

source:
  url: https://github.com/DerThorsten/xeus-pywrap/archive/refs/tags/${{ version }}.tar.gz
  sha256: c51a9b1f7add28633f3f8262d3ea04df516e1c332b94b94925b1dd6ae60e7257

build:
  number: 0

requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake >=4
  - ninja
  host:
  - python
  - libpython
  - nlohmann_json
  - nlohmann_json-abi
  - xeus
  - xeus-lite >=5.0.0
  - pybind11
  - pybind11_json
  - xtl
  - pyjs >=4.0.1
  - zstd
  run:
  - python
  - pyjs-rt >=4.0.1

tests:
- package_contents:
    files:
    - bin/xpywrap.wasm
    - bin/xpywrap.js

about:
  license: BSD-3-Clause
  license_family: BSD-3
  license_file: LICENSE
  summary: xeus-pywrap
  homepage: https://github.com/DerThorsten/xeus-pywrap

extra:
  recipe-maintainers:
  - DerThorsten