context:
  version: 1.1.2

package:
  name: topcom
  version: ${{ version }}

source:
  url: https://www.wm.uni-bayreuth.de/de/team/rambau_joerg/TOPCOM-Downloads/TOPCOM-1_1_2.tgz
  sha256: 4fb10754ee5b76056441fea98f2c8dee5db6f2984d8c14283b49239ad4378ab6

build:
  number: 0

requirements:
  build:
  - make
  - ${{ compiler('cxx') }}
  host:
  - gmp
  - cddlib

tests:
- package_contents:
    files:
    - lib/libTOPCOM.a

about:
  homepage: https://www.wm.uni-bayreuth.de/de/team/rambau_joerg/TOPCOM/index.html
  license: GPL-3.0-only
  license_file: COPYING
  summary: TOPCOM is a package for computing Triangulations Of Point Configurations and Oriented Matroids.

extra:
  recipe-maintainers:
  - wangyenshu