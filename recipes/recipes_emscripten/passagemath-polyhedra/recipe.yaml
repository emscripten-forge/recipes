context:
  version: 10.8.3

package:
  name: passagemath-polyhedra
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/passagemath-polyhedra/passagemath_polyhedra-${{ version }}.tar.gz
  sha256: 67b02aa726d5b53e9b9687a5977a02683c52f0d21fd5e245a72f52194bc6d136

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .

requirements:
  build:
  - python
  - crossenv >=1.2
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - ${{ compiler("cxx") }}
  - pip
  - passagemath-setup
  - passagemath-environment
  - cython
  - gmpy2
  - cysignals
  - pkgconfig
  - numpy
  - passagemath-abi == ${{ version }}
  host:
  - python
  - gmp
  - mpfr
  - mpc
  - numpy
  - passagemath-modules
  run:
  - python
  - gmpy2
  - memory-allocator
  - cysignals
  - passagemath-glpk
  - passagemath-modules
  - passagemath-ppl

tests:
- script: pytester
  files:
    recipe:
    - test_passagemath_polyhedra.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run
    - passagemath-repl

about:
  license: GPL-2.0-or-later
  license_file: README.rst
  summary: 'passagemath: Convex polyhedra in arbitrary dimension, mixed integer linear optimization'
  description: |
    Distribution of a part of the Sage library for computations with convex polyhedra
    in arbitrary dimension (in exact rational arithmetic), and linear and mixed integer
    linear optimization (in floating point arithmetic).

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_polyhedra.py
  recipe-maintainers:
  - mkoeppe
