context:
  name: libbraiding
  version: 1.3.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/miguelmarco/libbraiding/releases/download/${{ version }}/libbraiding-${{ version }}.tar.gz
  sha256: d43a32e7770d5c9a89ae489c5ac353da9610a761f76745382cf7612eab046ffd

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler('cxx') }}

tests:
- package_contents:
    files:
    - lib/libbraiding.a
    - include/libbraiding.h

about:
  homepage: https://github.com/miguelmarco/libbraiding
  license: GPL-3.0-only
  license_file: README.md
  summary: cbraid/braiding are C++ libraries for computations on braid groups 

extra:
  recipe-maintainers:
  - wangyenshu