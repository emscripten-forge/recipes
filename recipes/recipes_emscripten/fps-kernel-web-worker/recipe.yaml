context:
  name: fps-kernel-web-worker
  version: 0.2.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/fps_kernel_web_worker-${{ version }}.tar.gz
  sha256: 5a600cce7c1eb57b56fe4a5eb6c4062e78a29bb6656796c7325c85f8c537a83d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . ${{ PIP_ARGS }}
  noarch: python

  files:
    exclude:
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'
requirements:
  build:
  - pip != 25.1
  - cross-python_${{ target_platform }}
  - uv-build
  host:
  - python
  run:
  - python
  - anyio
  - fps
  - jupyverse-kernel >=0.1.0,<0.2.0
  - pyjs >=4.0.5

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_import_kernelwebworker.py

about:
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/kernel_web_worker
  license: BSD-3-Clause
  license_file: COPYING.md
  summary: An FPS plugin for the kernel web worker API

extra:
  recipe-maintainers:
  - davidbrochart
