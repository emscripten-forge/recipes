context:
  name: executorch-cpp
  version: 1.2.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/pytorch/executorch/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 6506c3047e8c50bb034807a582ca434a41cd30fb026fccc1a40eda6672c7d477

build:
  number: 0
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake
    - flatbuffers
    - make
    - ninja
    - python
    - pytorch
    - pyyaml
  host:
    - flatcc
    - fxdiv
    - flatbuffers
    - gflags
    - nlohmann_json

tests:
  - package_contents:
      files:
        - include/executorch/runtime/executor/program.h
        - include/executorch/extension/data_loader/file_data_loader.h
        - include/executorch/extension/module/module.h
        - include/executorch/extension/tensor/tensor.h
        - lib/libexecutorch.a
        - lib/libexecutorch_core.a
        - lib/libportable_kernels.a
        - lib/libextension_data_loader.a
        - lib/libextension_flat_tensor.a
        - lib/libextension_module.a
        - lib/libextension_named_data_map.a
        - lib/libextension_tensor.a
        - lib/cmake/ExecuTorch/executorch-config.cmake
        - lib/cmake/ExecuTorch/ExecuTorchTargets.cmake
  - script:
      - build_tests.sh
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
    files:
      recipe:
        - build_tests.sh
        - tests/

about:
  homepage: https://pytorch.org/executorch/
  license: BSD-3-Clause
  license_file: LICENSE
  summary: PyTorch ExecuTorch C++ runtime for emscripten-wasm32
  description: |
    ExecuTorch is PyTorch's on-device inference runtime. This package provides
    the C++ runtime and core extensions as static libraries with CMake package
    exports for emscripten-wasm32 consumers.
  documentation: https://docs.pytorch.org/executorch/main/using-executorch-building-from-source.html
  repository: https://github.com/pytorch/executorch

extra:
  recipe-maintainers:
    - Copilot