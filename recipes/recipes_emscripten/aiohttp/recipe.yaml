context:
  name: aiohttp
  version: 3.12.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 0018956472ee535d2cad761a5bb88eb4ad80f94cd86472cee26a244799f7c79f

build:
  number: 0

  files:
    exclude:
    - '**/*.pyi'
    - '**/*.pxi'
    - '**/__pycache__/**'
    - '**/*.pyx'
    - '**/*.pxd'
    - '**/*.pyc'
  python:
    skip_pyc_compilation:
    - '**/*.py'

requirements:
  build:
  - ${{ compiler('cxx')}}
  - cross-python_${{ target_platform }}
  - python
  host:
  - python
  run:
  - aiosignal
  - aiohappyeyeballs
  - async-timeout
  - attrs
  - charset-normalizer
  - frozenlist
  - multidict
  - yarl

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_aiohttp.py

about:
  summary: Async http client/server framework (asyncio)
  homepage: https://github.com/aio-libs/aiohttp
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  maintainers:
  - IsabelParedes
