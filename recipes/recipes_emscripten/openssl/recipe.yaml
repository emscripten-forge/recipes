context:
  name: openssl
  version: 4.0.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://www.openssl.org/source/${{ name }}-${{ version }}.tar.gz
  sha256: 2db3f3a0d6ea4b59e1f094ace2c8cd536dffb87cdc39084c5afa1e6f7f37dd09

build:
  number: 0
  script:
  - build.sh

requirements:
  build:
  - ${{ compiler("c") }}

tests:
- package_contents:
    files:
    - lib/libcrypto.a
    - lib/libcrypto.so
    - lib/libssl.a
    - lib/libssl.so
    - include/openssl/crypto.h
    - include/openssl/ssl.h
    - lib/cmake/OpenSSL/OpenSSLConfig.cmake
- script:
  - build_tests.sh
  requirements:
    build:
    - ${{ compiler("cxx") }}
    - cmake
    - make
  files:
    recipe:
    - build_tests.sh
    - tests/

about:
  homepage: https://www.openssl.org/
  license_file: LICENSE.txt
  license: Apache-2.0
  license_family: Apache
  summary: OpenSSL is an open-source implementation of the SSL and TLS protocols
  repository: https://github.com/openssl/openssl
  documentation: https://docs.openssl.org/master/

extra:
  recipe-maintainers:
  - IsabelParedes
