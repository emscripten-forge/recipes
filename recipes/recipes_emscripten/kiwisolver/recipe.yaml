context:
  version: 1.5.0

package:
  name: kiwisolver
  version: ${{ version }}

source:
- url: https://pypi.io/packages/source/k/kiwisolver/kiwisolver-${{ version }}.tar.gz
  sha256: d4193f3d9dc3f6f79aaed0e5637f45d98850ebf01f7ca20e69457f3e8946b66a

build:
  number: 0

requirements:
  build:
  - ${{ compiler("cxx") }}
  - cross-python_emscripten-wasm32
    #- python
  - setuptools   # <60
  - setuptools_scm
  - pip
  - cppy
  host:
  - python

tests:
- script: pytester
  files:
    recipe:
    - test_kiwisolver.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run
    - setuptools
    - jaraco.text
    - platformdirs
about:
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: A fast implementation of the Cassowary constraint solver

  homepage: https://github.com/nucleic/kiwi
extra:
  recipe-maintainers:
  - DerThorsten
