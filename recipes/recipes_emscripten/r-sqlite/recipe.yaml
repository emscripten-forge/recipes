context:
  name: r-sqlite
  version: 3.53.2
  ccname: RSQLite

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ ccname }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ ccname }}_${{ version }}.tar.gz

  sha256: 801c7b874ba9b49c58c68112d7ad5cf6e6394040361dab00d855d29adc2ced01

build:
  number: 0
  skip: ${{ r_base == '4.6.0' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-bit64
  - r-blob
  - r-dbi
  - r-memoise
  - r-rcpp
  - r-cpp11
  - r-pkgconfig

  host:
  - r-base ==${{ r_base }}
  - r-bit64
  - r-blob
  - r-dbi
  - r-memoise
  - r-rcpp
  run:
  - r-bit64
  - r-blob
  - r-dbi
  - r-memoise





tests:
- package_contents:
    lib:
    - R/library/${{ ccname }}/libs/${{ ccname }}.so

about:
  homepage: hhttps://cran.r-project.org/web/packages/RSQLite/index.html
  repository: https://github.com/r-dbi/RSQLite
  license: GPL-2.0-only
  license_family: GPL2
  license_file: GPL-2
  summary: Embeds the SQLite database engine in R and provides an interface compliant with the DBI package.



extra:
  recipe-maintainers:
  - DerThorsten
