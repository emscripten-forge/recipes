context:
  version: 0.11.1
  name: xeus-r
  build_variant_prefix: ${{ "static_libpython_h" if r_main_module_static_libpython == "1" else "h" }}
  
package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus-r/archive/refs/tags/${{ version }}.tar.gz
  sha256: 69ea2d9c3909c41abe8f514f7b97361db34c80b6a3560a2915b4b8dcfe2e307e

build:
  number: 1
  # Dependencies not yet available for R 4.6.0 on conda-forge
  skip: ${{ r_base == '4.6.0' }}
  # Explicit build strings so downstream recipes can require the static-libpython version
  # variant, e.g. `xeus-r * *static_libpython*`.
  string: ${{ build_variant_prefix ~ (hash ~ "_" ~ build_number) }}

  # Pass the variant into build.sh (not inferred from the script by rattler-build).
  script:
    file: build.sh
    env:
      R_MAIN_MODULE_STATIC_LIBPYTHON: ${{ r_main_module_static_libpython }}


  variant:
    # Ensure rattler-build includes this key in the variant matrix.
    use_keys:
    - r_main_module_static_libpython
    # Deprioritize the static-libpython variant so the default build stays
    # preferred by the solver (via down_prioritize_variant / track_features).
    down_prioritize_variant: ${{ 1 if r_main_module_static_libpython == "1" else 0 }}


requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake
  - make
  # Dependencies to build hera
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - r-cli
  - r-evaluate
  - r-glue
  - r-IRdisplay
  - r-R6
  - r-repr
  - pkg-config
  host:
  - r-base ==${{ r_base }}
  - nlohmann_json
  - nlohmann_json-abi
  - xeus >=6,<7
  - xeus-lite >=5,<6
  - pcre2>=10.43
  - zlib>=1.2.13
  - libflang                    # for FortranRuntime
  - liblzma
  - bzip2
  - libiconv >=1.18
  - if: r_main_module_static_libpython == "1"
    then:
    - python
    - libpython
    - libffi
    - sqlite
    - openssl
    - zstd
  run:
  - if: r_main_module_static_libpython == "1"
    then:
    - python
  - r-main-module-abi
  - r-cli
  - r-evaluate
  - r-glue
  - r-IRdisplay
  - r-jsonlite
  - r-R6
  - r-repr
  - r-rlang
  - zlib

tests:
- package_contents:
    files:
    - bin/xr.js
    - bin/xr.wasm

about:
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Jupyter kernel for the R programming language
  homepage: https://github.com/jupyter-xeus/xeus-r
  documentation: https://xeus-r.readthedocs.io

extra:
  recipe-maintainers:
  - IsabelParedes
  - anutosh491
