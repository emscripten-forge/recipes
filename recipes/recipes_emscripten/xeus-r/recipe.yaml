context:
  version: 0.10.0
  name: xeus-r

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/coursekata/xeus-r/archive/d1b0e0dcf3411d3a409de456ed76a51ff48df377.tar.gz
  sha256: 6ebc6f6725f32ee58e43f7c6617ef5a6814b3c1c30a6488e72ebe9a2b4ef61dd

build:
  number: 3

requirements:
  build:
  - ${{ compiler("cxx") }}
  - cmake
  - make
  # Dependencies to build hera
  - cross-r-base_${{ target_platform }}
  - r-cli
  - r-evaluate
  - r-glue
  - r-IRdisplay
  - r-R6
  - r-repr
  host:
  - nlohmann_json
  - nlohmann_json-abi
  - xeus >=6,<7
  - xeus-lite >=5,<6
  - pcre2>=10.43
  - zlib>=1.2.13
  - libflang                    # for FortranRuntime
  - liblzma
  - bzip2
  - libiconv >=1.18
  run:
  - r-cli
  - r-evaluate
  - r-glue
  - r-IRdisplay
  - r-jsonlite
  - r-R6
  - r-repr
  - r-rlang
  - zlib

tests:
- package_contents:
    files:
    - bin/xr.js
    - bin/xr.wasm

about:
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  summary: Jupyter kernel for the R programming language
  homepage: https://github.com/jupyter-xeus/xeus-r
  documentation: https://xeus-r.readthedocs.io

extra:
  recipe-maintainers:
  - IsabelParedes
  - anutosh491
