context:
  name: suitesparse
  version: 7.12.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/DrTimothyAldenDavis/SuiteSparse/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 679412daa5f69af96d6976595c1ac64f252287a56e98cc4a8155d09cc7fd69e8

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - pkg-config
  - autoconf-archive
  - ${{ compiler('cxx') }}
  host:
  - openblas
  - gmp
  - mpfr

tests:
- package_contents:
    files:
    - lib/libsuitesparseconfig.a
    - include/suitesparse/SuiteSparse_config.h

about:
  homepage: https://people.engr.tamu.edu/davis/suitesparse.html
  license: BSD-3-Clause AND BSD-2-Clause AND Apache-2.0 AND LGPL-2.1-or-later AND GPL-2.0-or-later AND GPL-3.0-or-later AND GPL-3.0-only AND (LGPL-3.0-or-later OR GPL-2.0-or-later)
  license_file: LICENSE.txt
  summary: a suite of sparse matrix algorithms authored or co-authored by Tim Davis, Texas A&M University

extra:
  recipe-maintainers:
  - wangyenshu