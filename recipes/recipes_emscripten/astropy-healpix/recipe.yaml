context:
  name: astropy-healpix
  version: 1.1.3

package:
  name: ${{ name }}
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/a/astropy-healpix/astropy_healpix-${{ version }}.tar.gz
  sha256: f520d83abe8215d3e8e1a37b2bd91171ee36a6f55f110d5a2db863d75d81b3b7
  patches:
  - patches/emscripten.patch

build:
  number: 1
  script: ${{ PYTHON }} -m pip install . ${{ PIP_ARGS }}

  files:
    exclude:
    - '**/tests/**'
    - '**.dist-info/**'
    - '**/__pycache__/**'
    - '**/*.pyc'
    - '**/test_*.py'
  python:
    skip_pyc_compilation:
    - '**/*.py'

requirements:
  build:
  - python
  - cross-python_${{ target_platform }}
  - numpy
  - ${{ compiler('c') }}
  host:
  - python
  - pip
  - numpy
  - setuptools
  - setuptools_scm
  - extension-helpers
  - wheel
  run:
  - python
  - numpy
  - astropy >=3

tests:
- script: pytester
  requirements:
    build:
    - pytester
    run:
    - pytester-run
  files:
    recipe:
    - test_astropy_healpix.py

about:
  homepage: https://astropy-healpix.readthedocs.io
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: BSD-licensed HEALPix for Astropy
  description: BSD-licensed HEALPix for Astropy

extra:
  recipe-maintainers:
  - astrofrog
  - bsipocz
  - mwcraig
