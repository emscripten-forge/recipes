context:
  name: libhomfly
  version: '1.04'

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/miguelmarco/libhomfly/releases/download/${{ version }}/libhomfly-${{ version }}.tar.gz
  sha256: 659a77b4f4b53340d24a7d6a69f4219e77ab9439a6ab8afa0156b7f6bd7af64f

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - pkg-config
  - autoconf-archive
  host:
  - libgc

tests:
- package_contents:
    files:
    - lib/libhomfly.a
    - include/homfly.h

about:
  homepage: https://github.com/miguelmarco/libhomfly
  license: Unlicense
  license_file: LICENSE
  summary: Library to compute the homfly polynomial of a link.

extra:
  recipe-maintainers:
  - wangyenshu