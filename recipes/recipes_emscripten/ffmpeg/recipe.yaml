context:
  name: ffmpeg
  version: 8.1.2

recipe:
  name: ffmpeg
  version: ${{ version }}

build:
  number: 2

source:
  - url: https://ffmpeg.org/releases/${{ name }}-${{ version }}.tar.xz
    sha256: b6863adde98898f42602017462871b5f6333e65aec803fdd7a6308639c52edf3

outputs:
  - staging:
      name: ffmpeg-build
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - make
        - pkg-config
      host: []
    build:
      script: build.sh

  - package:
      name: ffmpeg
      version: ${{ version }}
    inherit: ffmpeg-build
    build:
      files:
        include:
          - lib/libavcodec.a
          - lib/libavformat.a
          - lib/libavutil.a
          - lib/libswscale.a
          - lib/libswresample.a
          - lib/libavfilter.a
          - lib/libavdevice.a
          - lib/pkgconfig/*.pc
          - lib/cmake/FFmpeg/**
          - include/**
    tests:
      - package_contents:
          lib:
            - libavcodec.a
            - libavformat.a
            - libavutil.a
            - libswscale.a
            - libswresample.a
            - libavfilter.a
            - libavdevice.a
          include:
            - libavcodec/avcodec.h
            - libavformat/avformat.h
            - libavutil/avutil.h
            - libswscale/swscale.h
            - libswresample/swresample.h
            - libavfilter/avfilter.h
          files:
            - lib/cmake/FFmpeg/FFmpegConfig.cmake
      - script:
          - bash build_tests.sh libs
        requirements:
          build:
            - ${{ compiler('c') }}
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
        files:
          recipe:
            - build_tests.sh
            - tests/

  - package:
      name: ffmpeg-cli
      version: ${{ version }}
    inherit: ffmpeg-build
    build:
      files:
        include:
          - bin/ffmpeg.js
          - bin/ffmpeg.wasm
          - bin/ffprobe.js
          - bin/ffprobe.wasm
    requirements:
      run:
        - ffmpeg =${{ version }}
    tests:
      - package_contents:
          bin:
            - ffmpeg
            - ffprobe
          files:
            - bin/ffmpeg.js
            - bin/ffmpeg.wasm
            - bin/ffprobe.js
            - bin/ffprobe.wasm
      - script:
          - bash build_tests.sh cli
        requirements:
          build:
            - nodejs
        files:
          recipe:
            - build_tests.sh

about:
  homepage: https://ffmpeg.org/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE.md
  summary: A complete, cross-platform solution to record, convert and stream audio and video
  description: |
    FFmpeg is the leading multimedia framework, able to decode, encode,
    transcode, mux, demux, stream, filter and play pretty much anything
    that humans and machines have created. It supports the most obscure
    ancient formats up to the cutting edge.
  documentation: https://ffmpeg.org/documentation.html
  repository: https://github.com/FFmpeg/FFmpeg

extra:
  recipe-maintainers:
  - Alex-PLACET
