context:
  name: ffmpeg
  version: 8.1.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://ffmpeg.org/releases/${{ name }}-${{ version }}.tar.xz
  sha256: b6863adde98898f42602017462871b5f6333e65aec803fdd7a6308639c52edf3

build:
  number: 1
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - make
    - pkg-config
  host: []
  run: []

tests:
  - package_contents:
      lib:
        - libavcodec.a
        - libavformat.a
        - libavutil.a
        - libswscale.a
        - libswresample.a
        - libavfilter.a
        - libavdevice.a
      bin:
        # Rattler adds .js and .wasm for Emscripten bin entries.
        - ffmpeg
        - ffprobe
      files:
        # Check both members of each Emscripten executable explicitly.
        - bin/ffmpeg.js
        - bin/ffmpeg.wasm
        - bin/ffprobe.js
        - bin/ffprobe.wasm
      include:
        - libavcodec/avcodec.h
        - libavformat/avformat.h
        - libavutil/avutil.h
        - libswscale/swscale.h
        - libswresample/swresample.h
        - libavfilter/avfilter.h
  - script:
      - build_tests.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - nodejs
    files:
      recipe:
        - build_tests.sh
        - tests/

about:
  homepage: https://ffmpeg.org/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE.md
  summary: A complete, cross-platform solution to record, convert and stream audio and video
  description: |
    FFmpeg is the leading multimedia framework, able to decode, encode,
    transcode, mux, demux, stream, filter and play pretty much anything
    that humans and machines have created. It supports the most obscure
    ancient formats up to the cutting edge.
  documentation: https://ffmpeg.org/documentation.html
  repository: https://github.com/FFmpeg/FFmpeg

extra:
  recipe-maintainers:
    - Alex-PLACET
