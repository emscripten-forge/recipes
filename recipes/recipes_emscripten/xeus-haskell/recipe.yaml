context:
  version: 0.3.0

package:
  name: xeus-haskell
  version: ${{ version }}

source:
  url: https://github.com/jupyter-xeus/xeus-haskell/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a2ec33edb675d04ea9e206a923aabf39e1e7e58d3b35f4471752ff320e64457f

build:
  number: 0

requirements:
  build:
  - ${{ compiler("cxx") }}
  - ${{ compiler("c") }}
  - cmake
  - make
  host:
  - nlohmann_json
  - nlohmann_json-abi
  - xeus
  - xeus-lite

tests:
- package_contents:
    files:
    - bin/xhaskell.wasm
    - bin/xhaskell.js

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Haskell kernel for Jupyter based on xeus
  homepage: https://github.com/jupyter-xeus/xeus-haskell

extra:
  recipe-maintainers:
  - tani
