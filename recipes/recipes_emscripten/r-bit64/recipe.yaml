context:
  name: r-bit64
  version: 4.8.2

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/r-lib/${{ name[2:] }}/archive/refs/tags/${{ version }}.tar.gz
  sha256: b9282f50dadd726896242af5d0788eed6f2df826c40c6f4842fa81dbd31d4e79

build:
  number: 6
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-bit
  host:
  - r-base ==${{ r_base }}
  - r-bit
  run:
  - r-bit

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so

about:
  homepage: https://bit64.r-lib.org/
  repository: https://github.com/r-lib/bit64
  license: GPL-2.0-only
  license_family: GPL2
  license_file: GPL-2
  summary: S3 Class for Vectors of 64bit Integers

extra:
  recipe-maintainers:
    - IsabelParedes
