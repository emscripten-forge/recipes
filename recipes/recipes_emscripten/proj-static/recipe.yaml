context:
  name: proj-static
  version: 9.8.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://download.osgeo.org/proj/proj-${{ version }}.tar.gz
  sha256: a8b493b00cf4d08b712b9e063ed5e53e2be90fcde46770e9dbd773341f378f43

build:
  number: 0

  files:
    exclude:
    - '**/*.ini'
    - share/man/man1/**
requirements:
  build:
  - cmake
  - make
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - requests
  host:
  - sqlitecpp
  - libtiff
  run:
  - sqlitecpp
  - libtiff

tests:
- script:
  - test -f ${PREFIX}/include/proj.h

about:
  homepage: https://proj.org/
  license: MIT
  license_file: COPYING
  summary: Cartographic Projections and Coordinate Transformations Library

extra:
  recipe-maintainers:
  - KGB99
