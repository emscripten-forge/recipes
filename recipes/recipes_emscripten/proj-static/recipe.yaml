context:
  name: proj-static
  version: 9.8.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://download.osgeo.org/proj/proj-${{ version }}.tar.gz
  sha256: af5b731c145c1d13c4e3b4eeb7d167e94e845e440f71e3496b4ed8dae0291960

build:
  number: 0

  files:
    exclude:
    - share/man/man1/**
    - '**/*.ini'
requirements:
  build:
  - cmake
  - make
  - ${{ compiler('c') }}
  - ${{ compiler('cxx') }}
  - requests
  host:
  - sqlitecpp
  - libtiff
  run:
  - sqlitecpp
  - libtiff

tests:
- script:
  - test -f ${PREFIX}/include/proj.h

about:
  homepage: https://proj.org/
  license: MIT
  license_file: COPYING
  summary: Cartographic Projections and Coordinate Transformations Library

extra:
  recipe-maintainers:
  - KGB99
