context:
  name: RSQLite
  version: 3.53.3

package:
  name: r-${{ name | lower }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  sha256: 82946aac5e2869da5fdaf57d0e4afeee3d4deac21d9eaeffb5f743273a93736c
  patches:
  - patches/0001-Disable-libcurl.patch

build:
  number: 0
  # Dependencies not yet available for R 4.6.0 on conda-forge
  skip: ${{ r_base == '4.6.0' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-bit64
  - r-blob
  - r-cpp11
  - r-dbi
  - r-memoise
  - r-pkgconfig
  - r-rlang
  host:
  - r-base ==${{ r_base }}
  - r-bit64
  - r-blob
  - r-cpp11
  - r-dbi
  - r-memoise
  - r-pkgconfig
  - r-rlang
  run:
  - r-bit64
  - r-blob
  - r-cpp11
  - r-dbi
  - r-memoise
  - r-pkgconfig
  - r-rlang

tests:
- package_contents:
    lib:
    - R/library/${{ name }}/libs/${{ name }}.so
- script: run_r_test test_rsqlite.R
  files:
    recipe:
    - test_rsqlite.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://cran.r-project.org/package=${{ name }}
  repository: https://github.com/r-dbi/RSQLite
  license: LGPL-2.1-or-later
  license_family: LGPL
  license_file: LGPL-2.1
  summary: SQLite Interface for R
  description: |
    Embeds the SQLite database engine in R and provides an interface compliant
    with the DBI package. The source for the SQLite engine and for various
    extensions is included. System libraries will never be consulted because
    this package relies on static linking for the plugins it includes; this also
    ensures a consistent experience across all installations.

extra:
  recipe-maintainers:
  - IsabelParedes
