context:
  version: 10.8.2

package:
  name: passagemath-setup
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/passagemath-setup/passagemath_setup-${{ version }}.tar.gz
  sha256: 0db9d0371106790dda1af6c934676c8e1a9b341d16f805303224072507c22ac0

build:
  script: ${{ PYTHON }} -m pip install .
  noarch: python
  number: 1

requirements:
  build:
  - python
  - crossenv >=1.2
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - pip
  - passagemath-abi
  host:
  - python
  - setuptools
  - wheel
  - pip
  run:
  - python
  - setuptools
  - jinja2

tests:
- script: pytester
  files:
    recipe:
    - test_passagemath_setup.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run

about:
  summary: 'passagemath: Build system of the Sage library'
  license: GPL-2.0-or-later
  license_file: README.rst
  description: |
    sage-setup: Build system of the Sage library
    ================================================

    This is the build system of the Sage library, based on setuptools.

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_setup.py
  recipe-maintainers:
  - mkoeppe
