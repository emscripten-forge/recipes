context:
  version: 10.8.6

package:
  name: passagemath-categories
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/passagemath-categories/passagemath_categories-${{ version }}.tar.gz
  sha256: 7a30da14f6c205f0b2d0202c5ac87903e1bab74b88646ad97e63a985586d4a52

build:
  script: |
    patch -p2 < ${RECIPE_DIR}/patches/0001-src-sage-interfaces-expect.py-Make-it-importable-on-.patch
    ${{ PYTHON }} -m pip install .
  number: 1

requirements:
  build:
  - python
  - crossenv >=1.2
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - ${{ compiler("cxx") }}
  - pip
  - passagemath-setup
  - passagemath-environment
  - cython
  - gmpy2
  - cysignals
  - pkgconfig
  - passagemath-abi == ${{ version }}
  host:
  - python
  - gmp
  - mpfr
  - mpc
  - passagemath-objects
  - memory-allocator
  run:
  - python
  - gmpy2
  - cysignals
  - memory-allocator
  - passagemath-objects

tests:
- script: pytester
  files:
    recipe:
    - test_passagemath_categories.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run
    - passagemath-repl

about:
  summary: 'passagemath: Sage categories and basic rings'
  license: GPL-2.0-or-later
  license_file: README.rst
  description: |
    Distribution of a small part of the Sage library.
    Building on top of passagemath-objects (providing Sage objects, the element/parent framework, basic
    categories, the coercion system, and the related metaclasses), it contains the full set of categories
    defined by Sage, as well as basic mathematical objects such as integers and rational numbers, a basic
    implementation of polynomials, and affine spaces.  None of this brings in additional dependencies.

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_categories.py
  recipe-maintainers:
  - mkoeppe
