context:
  name: survival
  version: 3.8-9

package:
  name: r-${{ name }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  sha256: 9aa8fadd4fb185ac48f260c9d0f69fd6dfff4a4e2724920618057aa1f5d5bfbe

build:
  number: 0
  # Dependencies not yet available for R 4.6.x on conda-forge
  skip: ${{ r_base == '4.6.1' }}
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-matrix
  host:
  - r-base ==${{ r_base }}
  - r-matrix
  run:
  - r-matrix

tests:
- package_contents:
    lib:
    - R/library/${{ name }}/libs/${{ name }}.so
- script: run_r_test test_survival.R
  files:
    recipe:
    - test_survival.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://cran.r-project.org/package=survival
  repository: https://github.com/therneau/survival
  license: LGPL-2.0-or-later
  license_family: LGPL
  license_file: LGPL-2
  summary: Survival Analysis
  description: |
    Contains the core survival analysis routines, including definition of Surv
    objects, Kaplan-Meier and Aalen-Johansen (multi-state) curves, Cox models,
    and parametric accelerated failure time models.

extra:
  recipe-maintainers:
  - IsabelParedes
