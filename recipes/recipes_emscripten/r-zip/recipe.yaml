context:
  name: r-zip
  version: 3.0.1

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 0250e8426761dd37fa0f805cdde7dc11d4c8c55fc84afd01e93884e40f1a91fe

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - ${{ compiler('c') }}
  - make
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  host:
  - r-base ==${{ r_base }}
  - r-cli
  run:
  - r-cli

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so
- script: run_r_test test-r-zip.R
  files:
    recipe:
    - test-r-zip.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://r-lib.github.io/zip/
  repository: https://github.com/r-lib/zip
  summary: Cross-Platform 'zip' Compression Library. A replacement for the 'zip' function, that does not require any 
    additional external tools on any platform.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
  - rgaiacs
