context:
  version: 2.1-3
  name: colorspace

package:
  name: r-${{ name }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
  - https://cran.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  - https://cloud.r-project.org/src/contrib/${{ name }}_${{ version }}.tar.gz
  sha256: 47858800f9eed08cbcdbadba104b6502219c6f25f339c611161b374704cd03cc

build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  host:
  - r-base ==${{ r_base }}

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so

about:
  homepage: http://colorspace.R-Forge.R-project.org
  license: BSD-3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: A Toolbox for Manipulating and Assessing Colors and Palettes
  description: |
    Carries out mapping between assorted color spaces including RGB, HSV, HLS,
    CIEXYZ, CIELUV, HCL (polar CIELUV), CIELAB, and polar CIELAB. Qualitative,
    sequential, and diverging color palettes based on HCL colors are provided
    along with corresponding ggplot2 color scales.

extra:
  recipe-maintainers:
  - IsabelParedes
  - anutosh491
