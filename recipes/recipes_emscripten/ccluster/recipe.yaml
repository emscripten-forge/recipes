context:
  version: 1.1.8

package:
  name: ccluster
  version: ${{ version }}

source:
  url: https://github.com/rimbach/Ccluster/archive/refs/tags/v${{ version }}.zip
  sha256: dc00b0a9bbdb0a92a672aab674c754fe130766042a1a1ae7ef76377e957796b4

build:
  number: 0

requirements:
  build:
    - make
    - ${{ compiler('c') }}
  host:
    - gmp
    - mpfr
    - libflint

tests:
- package_contents:
    files:
    - lib/libccluster.a

about:
  repository: https://github.com/rimbach/Ccluster
  license: LGPL-2.1-only
  license_file: LICENSE
  summary: Ccluster is a C library implementing an algorithm for local clustering of the complex roots of a univariate polynomial whose coefficients are any complex numbers.

extra:
  recipe-maintainers:
    - wangyenshu