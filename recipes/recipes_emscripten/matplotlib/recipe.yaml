context:
  name: matplotlib
  version: 3.9.0

# package:
#   name: ${{ name|lower }}
#   version: ${{ version }}

source:
- url: https://github.com/matplotlib/matplotlib/archive/v${{ version }}.tar.gz
#  sha256: e6d29ea6c19e34b30fb7d88b7081f869a03014f66fe06d62cc77d5a6ea88ed7a
  sha256: 89877b314fe950b7abc118c1e518b0cc82fa9bb6e1228d26560e82be96ac009a

  patches:
  #- patches/disable_macosx_backend.patch
  - patches/fix-threading-and-font-cache.patch

build:
  number: 0


outputs:
  - package:
      name: matplotlib-base
      version: ${{ version }}
    build:
      script: build.sh
    requirements:
      build:
      - python
      - numpy
      - cross-python_${{target_platform}}
      - pybind11

      - ${{ compiler('c') }}
      - ${{ compiler('cxx') }}
      - pkg-config

          # TODO add certifi package to emscripten-wasm32 and depend in host on this
      - certifi
      - meson-python
      - pip >=24
      - setuptools_scm_git_archive
      host:
      - python
      - numpy
      - pybind11
      run:
      - contourpy
      - cycler
      - fonttools
      - kiwisolver
      - numpy
      - packaging
      - pillow
      - pyparsing
      - python-dateutil
      - pytz

  - package:
      name: matplotlib
      version: ${{ version }}
    build:
      script: build2.sh
    requirements:
      host:
      - python
      run:
      - python
      - ${{ pin_subpackage('matplotlib-base', exact=True) }}

    tests:
    - script: pytester
      files:
        recipe:
        - test_import_matplotlib.py
      requirements:
        build:
        - pytester
        run:
        - pytester-run
