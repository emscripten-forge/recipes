context:
  version: 2026.03.11
  name: r-prodlim

package:
  name: ${{ name }}
  version: ${{ version | replace('-', '_') }}

source:
  url:
    - https://cran.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
    - https://cloud.r-project.org/src/contrib/${{ name[2:] }}_${{ version }}.tar.gz
  sha256: 1364a6f0f77cae22395e8158cca6117e2b4b662146701767c6b65837ecce916a


build:
  number: 0
  script: $R CMD INSTALL $R_ARGS .
  skip: ${{ r_base == '4.6.0' }} 

requirements:
  build:
  - cross-r-base_${{ target_platform }} ==${{ r_base }}
  - ${{ compiler('c') }}
  - r-kernsmooth
  - r-rcpp >=0.11.5
  - r-data.table
  - r-diagram
  - r-ggplot2
  - r-lava
  - r-rlang
  - r-survival
  host:
  - r-base ==${{ r_base }}
  - r-kernsmooth
  - r-rcpp >=0.11.5
  - r-data.table
  - r-diagram
  - r-ggplot2
  - r-lava
  - r-rlang
  - r-survival
  run:
  - r-kernsmooth
  - r-rcpp >=0.11.5
  - r-data.table
  - r-diagram
  - r-ggplot2
  - r-lava
  - r-rlang
  - r-survival

tests:
- package_contents:
    lib:
    - R/library/${{ name[2:] }}/libs/${{ name[2:] }}.so
- script: run_r_test
  files:
    recipe:
    - test_import.R
  requirements:
    build:
    - r-wasm-tester

about:
  homepage: https://CRAN.R-project.org/package=prodlim
  license: GPL-2.0-or-later
  license_family: GPL2
  license_file: GPL-2
  summary: Fast and user friendly implementation of nonparametric estimators for censored event history (survival) analysis. Kaplan-Meier and Aalen-Johansen method.


extra:
  recipe-maintainers:
    - DerThorsten
