context:
  name: primesieve
  version: 12.14

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/kimwalisch/primesieve/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 65cf173e11bc9aff1b189f2cd19c6b6c502c30e966876b5c5ef71e138f49c8c9

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler('cxx') }}
  run_exports:
    - ${{ pin_subpackage('primesieve', upper_bound='x.x') }}

tests:
- package_contents:
    files:
    - lib/libprimesieve.a
    - include/primesieve.h
    - bin/primesieve.js
    - bin/primesieve.wasm

about:
  homepage: https://github.com/kimwalisch/primesieve
  license: BSD-2-Clause
  license_file: COPYING
  summary: Fast prime number generator 

extra:
  recipe-maintainers:
  - wangyenshu