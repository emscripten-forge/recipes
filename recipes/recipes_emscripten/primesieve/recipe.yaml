context:
  name: primesieve
  version: '12.15'

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/kimwalisch/primesieve/archive/refs/tags/v${{ version }}.tar.gz
  sha256: acaafd94cc30dbeef4808e682d0cb096c05d25f74eda5bacecefd323f697833f

build:
  number: 0

requirements:
  build:
  - autoconf
  - automake
  - libtool
  - make
  - ${{ compiler('cxx') }}
  run_exports:
  - ${{ pin_subpackage('primesieve', upper_bound='x.x') }}

tests:
- package_contents:
    files:
    - lib/libprimesieve.a
    - include/primesieve.h
    - bin/primesieve.js
    - bin/primesieve.wasm

about:
  homepage: https://github.com/kimwalisch/primesieve
  license: BSD-2-Clause
  license_file: COPYING
  summary: Fast prime number generator

extra:
  recipe-maintainers:
  - wangyenshu
