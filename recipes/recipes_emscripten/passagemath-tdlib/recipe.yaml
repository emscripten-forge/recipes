context:
  version: 10.8.2

package:
  name: passagemath-tdlib
  version: ${{ version }}

source:
- url: https://pypi.org/packages/source/p/passagemath-tdlib/passagemath_tdlib-${{ version }}.tar.gz
  sha256: 704d0556be2d73a0c69930f36041e6c0d7b8131ec10b33654412cf43676ae5a9

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .

requirements:
  build:
  - python
  - crossenv >=1.2
  - cross-python_emscripten-wasm32
  - ${{ compiler("c") }}
  - ${{ compiler("cxx") }}
  - pip
  - passagemath-setup
  - passagemath-environment
  - cython
  - cysignals
  - pkgconfig
  host:
  - python
  - boost-cpp
  - treedec
  run:
  - python
  - cysignals

tests:
- script: pytester
  files:
    recipe:
    - test_passagemath_tdlib.py
  requirements:
    build:
    - pytester
    run:
    - pytester-run
    - passagemath-repl

about:
  license: GPL-2.0-or-later
  license_file: README.rst
  summary: 'passagemath: Tree decompositions with tdlib'
  description: |
    Distribution of a part of the Sage library.
    It provides a Cython interface to the tdlib library, now also known as treedec,
    providing algorithms concerning tree decompositions.

extra:
  emscripten_tests:
    python:
      pytest_files:
      - test_passagemath_tdlib.py
  recipe-maintainers:
  - mkoeppe
