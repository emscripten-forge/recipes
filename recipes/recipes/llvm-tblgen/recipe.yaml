context:
  version: 22.1.8

package:
  name: llvm-tblgen
  version: ${{ version }}

source:
  url: https://github.com/llvm/llvm-project/archive/refs/tags/llvmorg-${{ version
    }}.tar.gz
  sha256: ad18b70e287954c3d62bc7e0b86e7b7af2adf87bcfce21c15fe717f101d7aace

build:
  number: 0

requirements:
  build:
  - cmake
  - make    # [unix]
  
tests:
- package_contents:
    files:
    - bin/llvm-tblgen
    - bin/clang-tblgen

about:
  license: Apache-2.0 WITH LLVM-exception
  license_family: Apache
  license_file: LICENSE.TXT
  summary: The LLVM Project is a collection of modular and reusable compiler and toolchain
    technologies.
  homepage: https://llvm.org

extra:
  recipe-maintainers:
  - DerThorsten
  - anutosh491
